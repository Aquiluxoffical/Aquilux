<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aquilux — Own. Your. Altitude.</title>
<style>
:root{--bg:#0a0a0a;--card:#111;--line:#222;--text:#f5f5f5}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
header{position:fixed;top:0;width:100%;padding:18px 8%;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,10,.55);backdrop-filter:blur(16px);border-bottom:1px solid #1f1f1f;z-index:10}
header img{height:34px}
nav a{color:#ddd;text-decoration:none;margin-left:26px}
.hero{height:100vh;display:grid;place-items:center;background:#000}
.hero .wrap{text-align:center;max-width:700px;padding:20px}
.hero h1{font-size:clamp(3rem,8vw,6rem);font-weight:300;letter-spacing:.08em}
.type{margin:20px auto;font-size:1.2rem;white-space:nowrap;overflow:hidden;border-right:2px solid #fff;width:0;animation:t 4s steps(20,end) forwards,b .8s infinite}
@keyframes t{to{width:18ch}}@keyframes b{50%{border-color:transparent}}
.btn{display:inline-block;margin-top:28px;padding:14px 34px;border:1px solid #fff;color:#fff;text-decoration:none;transition:.3s}
.btn:hover{background:#fff;color:#000}
section{padding:100px 8%}
.title{font-size:2rem;font-weight:300;margin-bottom:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px}
.card{border:1px solid var(--line);transition:.3s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;aspect-ratio:4/5;object-fit:cover}
.info{padding:18px}
.info h3{font-weight:400}
.price{opacity:.8;margin:10px 0}
button,select,input,textarea{width:100%;padding:12px;background:#111;color:#fff;border:1px solid #333;margin-top:10px}
button{cursor:pointer}
footer{padding:60px 8%;border-top:1px solid #222;text-align:center;color:#888}

.hero{position:relative;overflow:hidden;background:#000!important}
.hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero .wrap{position:relative;z-index:2}
.hero-bg:before{
content:'';
position:absolute;
width:700px;height:700px;
left:50%;top:50%;
transform:translate(-50%,-50%);
background:radial-gradient(circle,rgba(255,255,255,.15),rgba(255,255,255,.05) 35%,transparent 70%);
filter:blur(10px);
animation:pulse 8s ease-in-out infinite;
}
.hero-bg:after{
content:'';
position:absolute;inset:0;
background:
radial-gradient(circle at 20% 40%,rgba(255,255,255,.06),transparent 20%),
radial-gradient(circle at 80% 60%,rgba(255,255,255,.05),transparent 25%);
animation:moveGlow 12s ease-in-out infinite alternate;
}
.hero-bg span{
position:absolute;
width:3px;height:3px;
background:#fff;border-radius:50%;
box-shadow:0 0 10px #fff;
opacity:.7;
animation:floatUp linear infinite;
}
.hero-bg span:nth-child(1){left:4%;animation-duration:11s;animation-delay:-0.4s;}
.hero-bg span:nth-child(2){left:8%;animation-duration:12s;animation-delay:-0.8s;}
.hero-bg span:nth-child(3){left:12%;animation-duration:13s;animation-delay:-1.2000000000000002s;}
.hero-bg span:nth-child(4){left:16%;animation-duration:14s;animation-delay:-1.6s;}
.hero-bg span:nth-child(5){left:20%;animation-duration:15s;animation-delay:-2.0s;}
.hero-bg span:nth-child(6){left:24%;animation-duration:16s;animation-delay:-2.4000000000000004s;}
.hero-bg span:nth-child(7){left:28%;animation-duration:17s;animation-delay:-2.8000000000000003s;}
.hero-bg span:nth-child(8){left:32%;animation-duration:10s;animation-delay:-3.2s;}
.hero-bg span:nth-child(9){left:36%;animation-duration:11s;animation-delay:-3.6s;}
.hero-bg span:nth-child(10){left:40%;animation-duration:12s;animation-delay:-4.0s;}
.hero-bg span:nth-child(11){left:44%;animation-duration:13s;animation-delay:-4.4s;}
.hero-bg span:nth-child(12){left:48%;animation-duration:14s;animation-delay:-4.800000000000001s;}
.hero-bg span:nth-child(13){left:52%;animation-duration:15s;animation-delay:-5.2s;}
.hero-bg span:nth-child(14){left:56%;animation-duration:16s;animation-delay:-5.6000000000000005s;}
.hero-bg span:nth-child(15){left:60%;animation-duration:17s;animation-delay:-6.0s;}
.hero-bg span:nth-child(16){left:64%;animation-duration:10s;animation-delay:-6.4s;}
.hero-bg span:nth-child(17){left:68%;animation-duration:11s;animation-delay:-6.800000000000001s;}
.hero-bg span:nth-child(18){left:72%;animation-duration:12s;animation-delay:-7.2s;}
.hero-bg span:nth-child(19){left:76%;animation-duration:13s;animation-delay:-7.6000000000000005s;}
.hero-bg span:nth-child(20){left:80%;animation-duration:14s;animation-delay:-8.0s;}
.hero-bg span:nth-child(21){left:84%;animation-duration:15s;animation-delay:-8.4s;}
.hero-bg span:nth-child(22){left:88%;animation-duration:16s;animation-delay:-8.8s;}
.hero-bg span:nth-child(23){left:92%;animation-duration:17s;animation-delay:-9.200000000000001s;}
.hero-bg span:nth-child(24){left:96%;animation-duration:10s;animation-delay:-9.600000000000001s;}
.hero-bg span:nth-child(25){left:0%;animation-duration:11s;animation-delay:-10.0s;}

@keyframes floatUp{
0%{transform:translateY(110vh) scale(.3);opacity:0}
20%{opacity:.8}
100%{transform:translateY(-120px) scale(1.2);opacity:0}
}
@keyframes pulse{
50%{transform:translate(-50%,-50%) scale(1.25)}
}
@keyframes moveGlow{
from{transform:translateX(-30px)}
to{transform:translateX(30px)}
}

</style>
</head>
<body>
<header>
<div style="display:flex;align-items:center;gap:12px"><img src="https://i.ibb.co/KcK5JqBf/IMG-0068.png"><strong>Aquilux</strong></div>
<nav><a href="#shop">Shop</a><a href="#cart">Cart</a></nav>
</header>

<section class="hero">
<div class="hero-bg"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
<div class="wrap">
<h1>Aquilux</h1>
<div class="type">Own. Your. Altitude.</div>
<a href="#shop" class="btn">SHOP NOW</a>
</div>
</section>

<section id="shop">
<div class="title">Collection</div>
<div class="grid" id="grid"></div>
</section>

<section id="cart">
<div class="title">Cart</div>
<div id="items"></div>
<h2>Total ₹<span id="total">0</span></h2>
<input id="n" placeholder="Full Name">
<input id="p" placeholder="Phone">
<textarea id="a" placeholder="Delivery Address"></textarea>
<button onclick="checkout()">Checkout on WhatsApp</button>
</section>

<footer>
<p>Own. Your. Altitude.</p>
<p>aquilux.support@gmail.com</p>
</footer>

<script>
const products=[
["Altitude Tee",999,"https://i.ibb.co/R4PTq00T/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],
["Classic Oversized",999,"https://i.ibb.co/3mt9mrDN/IMG-0424.jpg"],
["Premium Street",1099,"https://i.ibb.co/HMYVKm3/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],
["Luxury Fit",699,"https://i.ibb.co/C5bvGbnd/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],
["Luxury Fit",599,"https://i.ibb.co/JWtCwG3r/IMG-0307.jpg"],
["Luxury Fit",599,"https://i.ibb.co/wFCQCfhZ/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],  
["Luxury Fit",599,"https://i.ibb.co/c0d46XP/Green-and-Beige-Modern-Casual-Fashion-Poster-4.jpg"],
];
let cart=[];
const g=document.getElementById("grid");
products.forEach((p,i)=>{
g.innerHTML+=`<div class=card>
<img src="${p[2]}">
<div class=info>
<h3>${p[0]}</h3>
<div class=price>₹${p[1]}</div>
<select id=s${i}><option>S</option><option>M</option><option>L</option><option>XL</option></select>
<button onclick="add(${i})">ADD TO CART</button>
</div></div>`;
});
function add(i){
let s=document.getElementById("s"+i).value;
let f=cart.find(x=>x.n==products[i][0]&&x.s==s);
if(f)f.q++;else cart.push({n:products[i][0],p:products[i][1],s:s,q:1});
draw();
}
function draw(){
let h="",t=0;
cart.forEach((c,i)=>{t+=c.p*c.q;h+=`<p>${c.n} (${c.s}) × ${c.q} — ₹${c.p*c.q} <a href=# onclick="cart.splice(${i},1);draw()">✕</a></p>`});
items.innerHTML=h||"Cart is empty.";
total.textContent=t;
}
function checkout(){
if(!cart.length)return alert("Cart is empty");
let msg=`*Aquilux Order*%0AName:${n.value}%0APhone:${p.value}%0AAddress:${a.value}%0A%0A`;
let tot=0;
cart.forEach(c=>{msg+=`${c.n} ${c.s} x${c.q} = ₹${c.p*c.q}%0A`;tot+=c.p*c.q});
msg+=`%0ATotal: ₹${tot}`;
window.open("https://wa.me/919558039135?text="+msg,"_blank");
setTimeout(()=>alert("Thank you for your order."),600);
}
</script>
</body>
</html>
