<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Aquilux — Own. Your. Altitude.</title>
<style>
/* 1. Global Variables & Base Resets */
:root {
    --bg: #0a0a0a;
    --card: #111;
    --line: #222;
    --text: #f5f5f5;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html {
    scroll-behavior: smooth;
}
body {
    font-family: Inter, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* 2. Header & Navigation */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 10, 10, .55);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid #1f1f1f;
    z-index: 100;
}
header img {
    height: 34px;
}
.logo-box {
    display: flex;
    align-items: center;
    gap: 12px;
}
.header-right {
    display: flex;
    align-items: center;
    gap:10px;
    flex-wrap:nowrap;
    
}
nav a {
    color: #ddd;
    text-decoration: none;
    margin-left: 26px;
}

/* 3. Hero Section & Background Animations */
.hero {
    height: 100vh;
    display: grid;
    place-items: center;
    background: #000 !important;
    position: relative;
    overflow: hidden;
}
.hero .wrap {
    text-align: center;
    max-width: 700px;
    padding: 20px;
    position: relative;
    z-index: 2;
}
.hero h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 300;
    letter-spacing: .08em;
}
.type {
    margin: 20px auto;
    font-size: 1.2rem;
    white-space: nowrap;
    overflow: hidden;
    border-right: 2px solid #fff;
    width: 0;
    animation: t 4s steps(20, end) forwards, b .8s infinite;
}
.btn {
    display: inline-block;
    margin-top: 28px;
    padding: 14px 34px;
    border: 1px solid #fff;
    color: #fff;
    text-decoration: none;
    transition: .3s;
}
.btn:hover {
    background: #fff;
    color: #000;
}

/* Hero Background Effects */
.hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    overflow: hidden;
}
.hero-bg:before {
    content: '';
    position: absolute;
    width: 700px;
    height: 700px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255, 255, 255, .15), rgba(255, 255, 255, .05) 35%, transparent 70%);
    filter: blur(10px);
    animation: pulse 8s ease-in-out infinite;
}
.hero-bg:after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 20% 40%, rgba(255, 255, 255, .06), transparent 20%), radial-gradient(circle at 80% 60%, rgba(255, 255, 255, .05), transparent 25%);
    animation: moveGlow 12s ease-in-out infinite alternate;
}
.hero-bg span {
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 10px #fff;
    opacity: .7;
    animation: floatUp linear infinite;
}

/* Keyframes */
@keyframes t { to { width: 18ch } }
@keyframes b { 50% { border-color: transparent } }
@keyframes floatUp {
    0% { transform: translateY(110vh) scale(.3); opacity: 0 }
    20% { opacity: .8 }
    100% { transform: translateY(-120px) scale(1.2); opacity: 0 }
}
@keyframes pulse { 50% { transform: translate(-50%, -50%) scale(1.25) } }
@keyframes moveGlow { from { transform: translateX(-30px) } to { transform: translateX(30px) } }

/* Hero BG Dots Delays */
.hero-bg span:nth-child(1) { left: 4%; animation-duration: 11s; animation-delay: -0.4s; }
.hero-bg span:nth-child(2) { left: 8%; animation-duration: 12s; animation-delay: -0.8s; }
.hero-bg span:nth-child(3) { left: 12%; animation-duration: 13s; animation-delay: -1.2s; }
.hero-bg span:nth-child(4) { left: 16%; animation-duration: 14s; animation-delay: -1.6s; }
.hero-bg span:nth-child(5) { left: 20%; animation-duration: 15s; animation-delay: -2.0s; }
.hero-bg span:nth-child(6) { left: 24%; animation-duration: 16s; animation-delay: -2.4s; }
.hero-bg span:nth-child(7) { left: 28%; animation-duration: 17s; animation-delay: -2.8s; }
.hero-bg span:nth-child(8) { left: 32%; animation-duration: 10s; animation-delay: -3.2s; }
.hero-bg span:nth-child(9) { left: 36%; animation-duration: 11s; animation-delay: -3.6s; }
.hero-bg span:nth-child(10) { left: 40%; animation-duration: 12s; animation-delay: -4.0s; }
.hero-bg span:nth-child(11) { left: 44%; animation-duration: 13s; animation-delay: -4.4s; }
.hero-bg span:nth-child(12) { left: 48%; animation-duration: 14s; animation-delay: -4.8s; }
.hero-bg span:nth-child(13) { left: 52%; animation-duration: 15s; animation-delay: -5.2s; }
.hero-bg span:nth-child(14) { left: 56%; animation-duration: 16s; animation-delay: -5.6s; }
.hero-bg span:nth-child(15) { left: 60%; animation-duration: 17s; animation-delay: -6.0s; }
.hero-bg span:nth-child(16) { left: 64%; animation-duration: 10s; animation-delay: -6.4s; }
.hero-bg span:nth-child(17) { left: 68%; animation-duration: 11s; animation-delay: -6.8s; }
.hero-bg span:nth-child(18) { left: 72%; animation-duration: 12s; animation-delay: -7.2s; }
.hero-bg span:nth-child(19) { left: 76%; animation-duration: 13s; animation-delay: -7.6s; }
.hero-bg span:nth-child(20) { left: 80%; animation-duration: 14s; animation-delay: -8.0s; }
.hero-bg span:nth-child(21) { left: 84%; animation-duration: 15s; animation-delay: -8.4s; }
.hero-bg span:nth-child(22) { left: 88%; animation-duration: 16s; animation-delay: -8.8s; }
.hero-bg span:nth-child(23) { left: 92%; animation-duration: 17s; animation-delay: -9.2s; }
.hero-bg span:nth-child(24) { left: 96%; animation-duration: 10s; animation-delay: -9.6s; }
.hero-bg span:nth-child(25) { left: 0%; animation-duration: 11s; animation-delay: -10.0s; }

/* 4. Section & Layout Grid */
section {
    padding: 100px 8%;
}
.title {
    font-size: 2rem;
    font-weight: 300;
    margin-bottom: 30px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 22px;
}

/* 5. Product Cards & UI Interactivity */
.card, button, select {
    transition: .3s ease;
}
.card:hover, button:hover, select:hover {
    transform: translateY(-4px);
    border-color: #fff;
    box-shadow: 0 10px 25px rgba(255, 255, 255, .08);
}
.card {
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
}
.card img {
    width: 100%;
    aspect-ratio: 4/5;
    object-fit: cover;
    border-radius: 18px;
}
.info {
    padding: 18px;
    text-align: center;
}
.info h3 {
    font-weight: 400;
}
.price {
    opacity: .8;
    margin: 10px 0;
}

/* 6. Form Inputs & Select Elements */
button, input, textarea {

    padding: 12px;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    margin-top: 10px;
}
button {
    cursor: pointer;
    width:auto;
}

input,
textarea{
    width:100%;    
}
    
select {
    width: 60%;
    padding: 12px;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    margin-top: 10px;
    text-align-last: center;
}

/* 7. Quantity & Cart Controls */
.qty {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
}
.qty button {
    width: 42px;
    height: 42px;
    padding: 0;
    font-size: 22px;
    border-radius: 50%;
}
.qty span {
    min-width: 25px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
}
.cart-title {
    display:flex;
    align-items:center;
    gap:6px;
    margin:0;
    font-size:20px;
    text-decoration:none;
    color:#fff;
    cursor:pointer;
    margin-right:10px;
    flex-shrink:0;
}

.cart-title:hover{
    opacity:.85;
}

#cartCount {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    color: #000;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 700;
}

/* 8. Cart Table Structure */
.cart-table{
    width:100%;
    margin-top:20px;
    border-collapse:separate;
    border-spacing:0;
    background:#141414;
    border:1px solid #2b2b2b;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.cart-table th{
    background:linear-gradient(180deg,#1f1f1f,#171717);
    padding:16px;
    border-bottom:1px solid #2f2f2f;
    font-weight:600;
    text-align:center;
    color:#fff;
    letter-spacing:.4px;
}

.cart-table td{
    padding:15px;
    text-align:center;
    background:#141414;
    border-bottom:1px solid #242424;
    color:#e8e8e8;
}

.cart-table tbody tr:nth-child(even){
    background:#181818;
}

.cart-table tbody tr:nth-child(even) td{
    background:#181818;
}

.cart-table tbody tr:hover td{
    background:#202020;
    transition:.25s;
}

.cart-table tr:last-child td{
    border-bottom:none;
}
.delete-btn {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    width: auto;
    padding: 0;
}
.delete-btn:hover {
    transform: scale(1.2);
}
#items {
    overflow-x: auto;
}

/* 9. Checkout & Delivery Elements */
.delivery-card {
    margin-top: 40px;
    padding: 25px;
    background: #111;
    border: 1px solid #222;
    border-radius: 18px;
}
.delivery-card h2 {
    margin-bottom: 20px;
    font-weight: 400;
}
.input-row {
    display: flex;
    gap: 15px;
    margin-top: 10px;
}
.input-row input {
    flex: 1;
}
.input-row button {
    width: auto;
    min-width: 100px;
    margin-top: 0;
    flex-shrink: 0;
}
.payment-btn {
    margin-top: 25px;
    background: #fff;
    color: #000;
    font-weight: 600;
}
.payment-btn:hover {
    background: #ddd;
}

/* 10. Modals & Popups */
.popup {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .75);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    backdrop-filter: blur(10px);
}
.popup-box {
    width: min(420px, 90%);
    background: #111;
    border: 1px solid #333;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
}
.popup-box h2 {
    margin-bottom: 25px;
    font-weight: 400;
}
.popup-box button {
    margin-top: 12px;
}
.close-btn {
    background: #222;
    color: #fff;
}

/* 11. Payment Gateways */
.payment-option {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 18px;
    margin-top: 15px;
    background: #181818;
    border: 1px solid #333;
    border-radius: 16px;
    cursor: pointer;
    transition: .3s;
}
.payment-option:hover {
    transform: translateY(-3px);
    border-color: #fff;
    box-shadow: 0 10px 25px rgba(255, 255, 255, .08);
}
.payment-option img {
    width: 42px;
    height: 42px;
    object-fit: contain;
    flex-shrink: 0;
    background: #fff;
    padding: 8px;
    border-radius: 12px;
}
.payment-option span {
    font-size: 17px;
    font-weight: 500;
    color: #fff;
}

/* 12. Footer */
footer {
    padding: 60px 8%;
    border-top: 1px solid #222;
    text-align: center;
    color: #888;
}

.google-btn{
    display: inline-flex !important; /* Force block to inline-flex */
    align-items: center !important;
    justify-content: center !important;
    flex-direction: row !important;
    gap: 8px;
    width: auto;
    padding: 10px 16px;
    background: #111;
    color: #fff;
    border: 1px solid #444;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    margin-top: 0 !important; /* Global margin-top ko zero kiya */
}

.google-btn:hover{
background:#1b1b1b;
border-color:#fff;
}

.google-btn img{
    width:20px;
    height:20px;
    display: inline-block !important; /* Block se badal kar inline-block kiya */
    flex-shrink: 0;
    margin: 0 !important;
}

.google-btn span{
    display:inline-block;
    font-size:15px;
    font-weight:500;
    line-height:1;
    margin:0;
}

.google-btn img,
.google-btn span{
    vertical-align:middle;
}

.google-btn span{
    white-space:nowrap;
}


/* ==========================================
   User Profile Box & Logout Button Styling
   ========================================== */

#userBox {
    align-items: center;
    gap: 16px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid #222;

}

.user-info {
    display: flex;

#userImg {

#userName {
    font-size: 14px;
    font-weight: 500;
    color: #ddd;
    max-width: 100px;
    white-space: nowrap;

}

/* Premium Logout Button */
.logout-btn {

    align-items: center;

    background: transparent !important;
    color: #888 !important;

    font-size: 13px !important;
    font-weight: 500;

.logout-btn:hover {

    transform: translateY(0) !important;
    box-shadow: none !important;
}

.logout-btn svg {
    transition: transform 0.2s ease;
}

.logout-btn:hover svg {
    transform: translateX(2px);
}

.total-box{
    margin:30px 0;
    padding:22px 28px;
    background:linear-gradient(180deg,#1b1b1b,#131313);
    border:1px solid #2c2c2c;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
    transition:.3s;
}

.total-box:hover{
    border-color:#555;
    box-shadow:0 18px 40px rgba(255,255,255,.06);
}

.total-label{
    font-size:17px;
    color:#bdbdbd;
    letter-spacing:.5px;
    text-transform:uppercase;
}

.total-price{
    font-size:30px;
    font-weight:700;
    color:#fff;
    letter-spacing:.5px;
}

}
    

</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
  authDomain: "aquilux-5b489.firebaseapp.com",
  projectId: "aquilux-5b489",
  storageBucket: "aquilux-5b489.firebasestorage.app",
  messagingSenderId: "93678277046",
  appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.auth = auth;
const provider = new GoogleAuthProvider();

window.googleLogin = () => {
  signInWithPopup(auth, provider);
};

window.googleLogout = () => {
  signOut(auth);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    // !important CSS ko overwrite karne ke liye setProperty ka use karenge
    document.getElementById("loginBtn").style.setProperty("display", "none", "important");
    document.getElementById("userBox").style.setProperty("display", "flex", "important");
    document.getElementById("userName").innerText = user.displayName;
    document.getElementById("userImg").src = user.photoURL;
  } else {
    document.getElementById("loginBtn").style.setProperty("display", "inline-flex", "important");
    document.getElementById("userBox").style.setProperty("display", "none", "important");
  }
});

</script>

<script>
const products=[
["Teamspirit",999,"https://i.ibb.co/R4PTq00T/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],
["Cherry Kiss Crop Tee",999,"https://i.ibb.co/3mt9mrDN/IMG-0424.jpg"],
["Serve the Lord",1099,"https://i.ibb.co/HMYVKm3/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],
["Courtside Terry Shorts",699,"https://i.ibb.co/C5bvGbnd/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],
["Aquilux Mosaie",599,"https://i.ibb.co/JWtCwG3r/IMG-0307.jpg"],
["Metropolitan Heritage Tee",599,"https://i.ibb.co/wFCQCfhZ/Green-and-Beige-Modern-Casual-Fashion-Poster.jpg"],  
["New York- Manhattan",599,"https://i.ibb.co/c0d46XP/Green-and-Beige-Modern-Casual-Fashion-Poster-4.jpg"],
["Slow Morning Club",599,"https://i.ibb.co/mCvsmh6m/IMG-0400.jpg"],
];
let cart=[];
const g=document.getElementById("grid");
products.forEach((p,i)=>{
g.innerHTML+=`<div class=card>
<img src="${p[2]}">
<div class=info>
<h3>${p[0]}</h3>
<div class=price>₹${p[1]}</div>
<select id="s${i}">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<div class="qty">
<button onclick="changeQty(${i},-1)">−</button>
<span id="q${i}">0</span>
<button onclick="changeQty(${i},1)">+</button>
</div>

<button onclick="addToCart(${i})">
ADD TO CART
</button>
</div></div>`;
});

let qty = Array(products.length).fill(0);

function changeQty(i,change){

    qty[i]+=change;

    if(qty[i]<1) qty[i]=0;

    document.getElementById("q"+i).textContent=qty[i];
}
    
function addToCart(i){

    if(qty[i]===0){
    alert("Please select quantity.");
    return;
}

    let size=document.getElementById("s"+i).value;

    let quantity=qty[i];

    let item=cart.find(x=>x.n==products[i][0] && x.s==size);

    if(item){
        item.q+=quantity;
    }else{
        cart.push({
            n:products[i][0],
            p:products[i][1],
            s:size,
            q:quantity
        });
    }

    draw();

    qty[i]=0;

    document.getElementById("q"+i).textContent=0;
}

function draw(){

let t=0;

let h=`
<table class="cart-table">
<thead>
<tr>
<th>Product</th>
<th>Size</th>
<th>Qty</th>
<th>Price</th>
<th></th>
</tr>
</thead>
<tbody>
`;

cart.forEach((c,i)=>{

t+=c.p*c.q;

h+=`
<tr>
<td>${c.n}</td>
<td>${c.s}</td>
<td>${c.q}</td>
<td>₹${c.p*c.q}</td>
<td>
<button class="delete-btn" onclick="cart.splice(${i},1);draw()">
🗑️
</button>
</td>
</tr>
`;

});

h+=`
</tbody>
</table>
`;

if(cart.length==0){
    h="Cart is empty.";
}

items.innerHTML = h;
total.textContent = t;

// 👇 Ye code yahi hona chahiye
let count = 0;

cart.forEach(item=>{
    count += item.q;
});

document.getElementById("cartCount").textContent = count;

} // <-- Function yahan close hoga  



function openPayment(){

document.getElementById("paymentPopup").style.display="flex";

}

function closePopup(){

document.getElementById("paymentPopup").style.display="none";

}


function pay(app){

    const amount = document.getElementById("total").textContent;

    const upi = "Yashojhaoffical1982@oksbi";
    const name = encodeURIComponent("Aquilux");
    const note = encodeURIComponent("Aquilux Order");

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);

    let appLink = "";
    let storeLink = "";

    switch(app){

        case "gpay":
            appLink = `gpay://upi/pay?pa=${upi}&pn=${name}&tn=${note}&am=${amount}&cu=INR`;

            storeLink = isIOS
            ? "https://apps.apple.com/in/app/google-pay-save-pay-manage/id1193357041"
            : "https://play.google.com/store/apps/details?id=com.google.android.apps.nbu.paisa.user";

            break;

        case "phonepe":
            appLink = `phonepe://pay?pa=${upi}&pn=${name}&tn=${note}&am=${amount}&cu=INR`;

            storeLink = isIOS
            ? "https://apps.apple.com/in/app/phonepe-secure-payments-app/id1170055821"
            : "https://play.google.com/store/apps/details?id=com.phonepe.app";

            break;

        case "paytm":
            appLink = `paytmmp://pay?pa=${upi}&pn=${name}&tn=${note}&am=${amount}&cu=INR`;

            storeLink = isIOS
            ? "https://apps.apple.com/in/app/paytm-secure-upi-payments/id473941634"
            : "https://play.google.com/store/apps/details?id=net.one97.paytm";

            break;
    }

    // Open App
    window.location.href = appLink;

    // Fallback to Store
let hidden=false;

document.addEventListener("visibilitychange",()=>{
hidden=document.hidden;
});

setTimeout(()=>{
if(!hidden){
window.location.href=storeLink;
}
},1800);

}

async function lookupPin(){

    const pin = document.getElementById("pincode").value;

    try{

        const res = await fetch("https://api.postalpincode.in/pincode/" + pin);

        const data = await res.json();

        if(data[0].Status==="Success"){

            document.getElementById("city").value =
            data[0].PostOffice[0].District;

            document.getElementById("state").value =
            data[0].PostOffice[0].State;

        }else{

            document.getElementById("city").value = "";
            document.getElementById("state").value = "";

            alert("Invalid PIN Code");

        }

    }catch{

        alert("Unable to fetch PIN details.");

    }

}
function checkPin(input){

    // Sirf numbers allow karo
    input.value = input.value.replace(/\D/g,'');

    // 6 digits hote hi lookup
    if(input.value.length === 6){
        lookupPin();
    }

}



    
    

    
</script>
