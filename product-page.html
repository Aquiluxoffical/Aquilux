<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aquilux — Product Detail Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

:root {
 --bg: #ffffff;             
 --text: #111111;           
 --line: rgba(17, 17, 17, 0.08); 
 --glass-bg: rgba(255, 255, 255, 0.45);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 font-family: 'Inter', Arial, sans-serif;
 background: var(--bg);
 color: var(--text);
 -webkit-font-smoothing: antialiased;
 padding-top: 100px;
}

header {
 position: fixed;
 top: 0;
 width: 100%;
 padding: 18px 6%;
 display: flex;
 justify-content: space-between;
 align-items: center;
 background: rgba(255, 255, 255, 0.85);
 backdrop-filter: blur(16px);
 border-bottom: 1px solid var(--line);
 z-index: 100;
}
.logo-box { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; cursor: pointer; text-decoration: none; color: inherit; }

/* Main Wrapper initially hidden to avoid ugly layout flashes */
.product-container {
 display: flex;
 max-width: 1200px;
 margin: 40px auto;
 padding: 0 4%;
 gap: 60px;
 align-items: center;
 visibility: hidden; 
 opacity: 0;
 transition: opacity 0.4s ease;
}
.product-media { flex: 1.2; position: relative; }
.product-info-panel { flex: 1; display: flex; flex-direction: column; justify-content: center; }

.main-display-image {
 width: 100%;
 aspect-ratio: 3/4;
 object-fit: cover;
 background: #f9f9f9;
 border-radius: 4px;
 transition: filter 0.4s ease;
}
.main-display-image.blurred {
 filter: blur(25px) brightness(0.95);
 pointer-events: none;
}

h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 400; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.price-tag { font-size: 1.4rem; font-weight: 500; margin-bottom: 35px; opacity: 0.9; }

.selector-wrapper { margin-bottom: 30px; }
.selector-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.4; margin-bottom: 12px; display: block; font-weight: 600; }

/* Premium Capsule Buttons for Size Selector */
.size-capsule-tray { display: flex; gap: 10px; flex-wrap: wrap; }
.size-node-btn {
 padding: 12px 20px; font-size: 12px; font-weight: 500; background: transparent;
 border: 1px solid var(--line); border-radius: 4px; color: var(--text); cursor: pointer;
 transition: all 0.2s ease;
}
.size-node-btn:hover { border-color: var(--text); }
.size-node-btn.selected { background: var(--text); color: var(--bg); border-color: var(--text); }

/* Quantity Layout Controls */
.qty-control-dock { display: inline-flex; align-items: center; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 30px; background: rgba(17,17,17,0.01); }
.qty-control-dock button { padding: 10px 18px; font-size: 16px; background: transparent; border: none; cursor: pointer; color: var(--text); transition: background 0.2s; }
.qty-control-dock button:hover { background: rgba(17,17,17,0.04); }
.qty-control-dock span { padding: 0 15px; font-size: 13px; font-weight: 600; min-width: 40px; text-align: center; user-select: none; }

/* Dual Action Button Architecture */
.button-action-stack { display: flex; flex-direction: column; gap: 12px; width: 100%; }

.action-btn {
 width: 100%;
 padding: 18px;
 font-size: 12px;
 font-weight: 600;
 letter-spacing: 2px;
 text-transform: uppercase;
 cursor: pointer;
 transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
 border-radius: 4px;
}
.bag-btn { background: transparent; color: var(--text); border: 1px solid var(--text); }
.bag-btn:hover { background: var(--text); color: var(--bg); }

/* Buy It Now Button Updated with Flex for Icons Alignment */
.buy-now-btn { 
 background: var(--text); 
 color: var(--bg); 
 border: 1px solid var(--text); 
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
}
.buy-now-btn:hover { background: transparent; color: var(--text); }
.buy-now-btn:hover .upi-icon-badge { filter: none; } /* Reverts inverted filter on hover if background turns white */

/* Sleek Payment Badges Container */
.upi-icons-container {
 display: inline-flex;
 align-items: center;
 gap: 6px;
}
.upi-icon-badge {
 height: 14px;
 width: auto;
 object-fit: contain;
 filter: brightness(0) invert(1); /* Inverts icons to pure clean white to match dark button theme */
 opacity: 0.9;
 transition: filter 0.4s ease;
}

.page-countdown-dock {
 margin-top: 30px; border: 1px dashed var(--line); padding: 25px;
 background: rgba(17,17,17,0.01); border-radius: 6px; text-align: center; display: none;
}
.countdown-grid { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
.countdown-box { background: var(--text); color: var(--bg); padding: 12px 16px; min-width: 70px; text-align: center; font-weight: 600; border-radius: 4px; font-size: 14px; }
.countdown-box span { display: block; font-size: 8px; opacity: 0.6; font-weight: 400; text-transform: uppercase; margin-top: 2px; }

/* Premium Shimmer Loading Keyframe Animation Layout */
.shimmer-loader {
    animation: placeholderShimmer 1.5s linear infinite;
    background: linear-gradient(to right, #f6f7f8 8%, #edeef1 18%, #f6f7f8 33%);
    background-size: 800px 104px;
    border-radius: 4px;
}
@keyframes placeholderShimmer {
    0% { background-position: -468px 0; }
    100% { background-position: 468px 0; }
}

@media (max-width: 768px) {
 .product-container { flex-direction: column; gap: 30px; }
 padding-top: 85px;
 h1 { font-size: 2.2rem; }
}
</style>
</head>
<body>

<!-- PREMIUM SYSTEM WELCOME LOADER (Matches index look perfectly) -->
<div id="pageMenuLoader">
 <img src="https://i.ibb.co/KcK5JqBf/IMG-0068.png" alt="Aquilux Logo">
 <p style="font-size: 13px; letter-spacing: 1px; font-weight: 400; opacity: 0.8;">Loading Aquilux parameters...</p>
</div>

<header>
 <a href="index.html" class="logo-box">Aquilux</a>
</header>

<div class="product-container" id="mainProductWrapper">
    <div class="product-media">
        <!-- Pure Shimmer Loader Overlay Panel Block -->
        <div id="imageShimmer" class="shimmer-loader" style="width:100%; aspect-ratio:3/4; position:absolute; inset:0; z-index:2;"></div>
        <img id="productImage" class="main-display-image" src="" alt="Aquilux Asset Log Core">
    </div>
    
    <div class="product-info-panel">
        <h1 id="productTitle"></h1>
        <div class="price-tag" id="productPrice"></div>
        
        <!-- Highly Functional Controls Dock Area -->
        <div id="interactivePurchaseControls">
            <div class="selector-wrapper">
                <span class="selector-label">Choose Size</span>
                <div class="size-capsule-tray" id="sizeCapsuleTrayContainer"></div>
            </div>

            <div class="selector-wrapper" style="margin-bottom: 20px;">
                <span class="selector-label">Quantity</span>
                <div class="qty-control-dock">
                    <button onclick="changePageQuantity(-1)">−</button>
                    <span id="pageQuantityDisplay">1</span>
                    <button onclick="changePageQuantity(1)">+</button>
                </div>
            </div>

            <!-- Premium Dual Action Stack Layout -->
            <div class="button-action-stack">
                <button class="action-btn buy-now-btn" id="buyNowBtn" onclick="handleInstantBuyNow()">
                    <span>Buy It Now</span>
                    <div class="upi-icons-container">
                        <img class="upi-icon-badge" src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Google_Pay_Logo.svg" alt="GPay">
                        <img class="upi-icon-badge" src="https://upload.wikimedia.org/wikipedia/commons/7/71/PhonePe_Logo.svg" alt="PhonePe">
                        <img class="upi-icon-badge" src="https://upload.wikimedia.org/wikipedia/commons/e/e1/BHIM_Logo.svg" alt="BHIM">
                    </div>
                </button>
                <button class="action-btn bag-btn" id="addToBagBtn" onclick="handlePageAddToCart()">Add To Bag</button>
            </div>
        </div>

        <!-- Dynamic Hype Clock Engine Container -->
        <div class="page-countdown-dock" id="pageCountdownModule">
            <span class="selector-label" style="opacity:0.8; font-weight:600;">Exclusive Drop Reveals In</span>
            <div class="countdown-grid" id="pageClockGrid"></div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxyihaeB4hLfxAL-9XdQDlRfDjg1oWcuiy0JlhiapCI9MGckg3eWGGqBXWNhubsaF2A/exec";
let targetProduct = null;
let chosenSize = "";
let selectedQty = 1;

async function initProductPage() {
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    
    if(!productId) { window.location.href = "index.html"; return; }

    try {
        const res = await fetch(API_URL + "?t=" + new Date().getTime());
        const products = await res.json();
        
        targetProduct = products.find((p, i) => String(p.id || p.ID || i) === String(productId));

        if(!targetProduct) { 
            document.getElementById("productTitle").innerText = "Product Not Found"; 
            hideLoaderAndShowContent();
            return; 
        }

        document.getElementById("productTitle").innerText = targetProduct.product;
        document.getElementById("productPrice").innerText = "₹" + targetProduct.price;
        const imgNode = document.getElementById("productImage");
        imgNode.src = targetProduct.image;
        
        // Hide animation once image stream hits client viewport safely
        imgNode.onload = function() {
            imgNode.style.opacity = "1";
            document.getElementById("imageShimmer").style.display = "none";
        };

        // Render dynamic premium size capsule nodes
        const sizes = targetProduct.sizes?.length > 0 ? targetProduct.sizes : ['S', 'M', 'L', 'XL'];
        const tray = document.getElementById("sizeCapsuleTrayContainer");
        tray.innerHTML = "";
        
        sizes.forEach((s, idx) => {
            const btn = document.createElement("button");
            btn.className = `size-node-btn ${idx === 0 ? 'selected' : ''}`;
            btn.innerText = s;
            if(idx === 0) chosenSize = s; 
            btn.onclick = () => {
                document.querySelectorAll(".size-node-btn").forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
                chosenSize = s;
            };
            tray.appendChild(btn);
        });

        // Time constraints validation logic
        let rawLaunch = targetProduct.launchDate || targetProduct.launchdate || null;
        let launchTimestamp = null;
        if (rawLaunch) {
            let cleanStr = String(rawLaunch).trim().replace(/\//g, '-');
            if(!cleanStr.includes('T') && cleanStr.includes(' ')) cleanStr = cleanStr.replace(' ', 'T');
            launchTimestamp = Date.parse(cleanStr);
        }

        const nowTime = new Date().getTime();
        if(launchTimestamp && launchTimestamp > nowTime) {
            imgNode.classList.add("blurred");
            document.getElementById("interactivePurchaseControls").style.display = "none";
            document.getElementById("pageCountdownModule").style.display = "block";
            startPageTimerLoop(launchTimestamp);
        }

        if(imgNode.complete) {
            hideLoaderAndShowContent();
        } else {
            imgNode.onload = function() {
                hideLoaderAndShowContent();
            };
        }

    } catch (e) { 
        document.getElementById("productTitle").innerText = "Syncing Parameters..."; 
        setTimeout(initProductPage, 1500); 
    }
}

function hideLoaderAndShowContent() {
    const loader = document.getElementById("pageMenuLoader");
    const container = document.getElementById("mainProductWrapper");
    
    loader.classList.add("hide");
    container.style.visibility = "visible";
    container.style.opacity = "1";
}

function changePageQuantity(amount) {
    selectedQty += amount;
    if(selectedQty < 1) selectedQty = 1;
    document.getElementById("pageQuantityDisplay").innerText = selectedQty;
}

function startPageTimerLoop(targetTime) {
    const loop = setInterval(() => {
        const now = new Date().getTime();
        const diff = targetTime - now;

        if(diff <= 0) {
            clearInterval(loop);
            document.getElementById("productImage").classList.remove("blurred");
            document.getElementById("interactivePurchaseControls").style.display = "block";
            document.getElementById("pageCountdownModule").style.display = "none";
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById("pageClockGrid").innerHTML = `
            <div class="countdown-box">${d}<span>Days</span></div>
            <div class="countdown-box">${String(h).padStart(2, '0')}<span>Hrs</span></div>
            <div class="countdown-box">${String(m).padStart(2, '0')}<span>Min</span></div>
            <div class="countdown-box">${String(s).padStart(2, '0')}<span>Sec</span></div>
        `;
    }, 1000);
}

function handlePageAddToCart() {
    if(!targetProduct) return;
    let localCart = JSON.parse(localStorage.getItem("aquilux_cart") || "[]");

    let existingItem = localCart.find(x => x.n === targetProduct.product && x.s === chosenSize);
    if(existingItem) {
        existingItem.q += selectedQty;
    } else {
        localCart.push({
            n: targetProduct.product,
            p: Number(targetProduct.price),
            s: chosenSize,
            q: selectedQty,
            img: targetProduct.image
        });
    }

    localStorage.setItem("aquilux_cart", JSON.stringify(localCart));
    alert(`${selectedQty} Item(s) successfully secured inside Shopping Bag!`);
    window.location.href = "index.html"; 
}

function handleInstantBuyNow() {
    if(!targetProduct) return;
    
    const savedAddr = JSON.parse(localStorage.getItem("aquilux_saved_address") || "{}");
    if(!savedAddr.receiverName || !savedAddr.phone || !savedAddr.pincode) {
        alert("Please setup your Shipping Address parameters inside Account Space first!");
        window.location.href = "index.html"; 
        return;
    }

    const singleProductCartPayload = [{
        n: targetProduct.product,
        p: Number(targetProduct.price),
        s: chosenSize,
        q: selectedQty,
        img: targetProduct.image
    }];

    const orderData = {
        cart: singleProductCartPayload,
        total: Number(targetProduct.price) * selectedQty,
        receiverName: savedAddr.receiverName,
        phone: savedAddr.phone,
        flat: savedAddr.flat || "",
        road: savedAddr.road || "",
        landmark: savedAddr.landmark || "", 
        city: savedAddr.city || "",
        state: savedAddr.state || "",
        pincode: savedAddr.pincode
    };

    localStorage.setItem("pendingOrder", JSON.stringify(orderData));
    window.location.href = "payment-gateway.html";
}

window.addEventListener("DOMContentLoaded", initProductPage);
</script>
</body>
</html>
