<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aquilux — Owner Console Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', Arial, sans-serif; }
body { background: #ffffff; color: #111111; padding: 40px 6%; -webkit-font-smoothing: antialiased; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 400; margin-bottom: 8px; letter-spacing: 0.5px; }
.subtitle { font-size: 14px; opacity: 0.6; margin-bottom: 40px; letter-spacing: 0.5px; text-transform: uppercase; }

.admin-table-wrapper { width: 100%; overflow-x: auto; border: 1px solid rgba(17, 17, 17, 0.08); border-radius: 8px; background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(12px); margin-bottom: 40px; }
.admin-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
.admin-table th { background: rgba(17, 17, 17, 0.02); padding: 16px; font-weight: 500; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; border-bottom: 1px solid rgba(17, 17, 17, 0.08); }
.admin-table td { padding: 18px 16px; border-bottom: 1px solid rgba(17, 17, 17, 0.06); vertical-align: top; }

.badge { display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; padding: 4px 10px; border-radius: 12px; letter-spacing: 0.5px; }
.badge.pending { background: rgba(255, 191, 0, 0.1); color: #d49b00; }
.badge.approved { background: rgba(24, 183, 90, 0.1); color: #148f43; }
.badge.rejected { background: rgba(255, 74, 74, 0.1); color: #c22d2d; }

.nested-items-list { margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
.nested-item-row { display: flex; align-items: center; gap: 12px; background: rgba(17,17,17,0.01); padding: 6px; border-radius: 4px; border: 1px solid rgba(17,17,17,0.03); }
.nested-item-row img { width: 40px; aspect-ratio: 3/4; object-fit: cover; border-radius: 2px; }

.action-btn { padding: 8px 14px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; margin-right: 5px; }
.action-btn.approve { background: #18b75a; color: #fff; border-color: #18b75a; }
.action-btn.approve:hover { background: transparent; color: #18b75a; }
.action-btn.reject { background: transparent; color: #888; border-color: rgba(17, 17, 17, 0.15); }
.action-btn.reject:hover { color: #ffbf00; border-color: #ffbf00; }
.action-btn.delete { background: #ff4a4a; color: #fff; border-color: #ff4a4a; }
.action-btn.delete:hover { background: transparent; color: #ff4a4a; }
</style>
</head>
<body>

<h1>Owner Console</h1>
<p class="subtitle">Aquilux Database Order Registry</p>

<div class="admin-table-wrapper">
 <table class="admin-table">
   <thead>
     <tr>
       <th>Order Details</th>
       <th>Customer & Shipping Address</th>
       <th>Products Breakdown</th>
       <th>Total</th>
       <th>Status</th>
       <th>Actions</th>
     </tr>
   </thead>
   <tbody id="adminOrdersContainer">
     <tr>
       <td colspan="6" style="text-align:center; opacity:0.5; padding:40px;">Syncing with Firebase secure node database...</td>
     </tr>
   </tbody>
 </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
 authDomain: "aquilux-5b489.firebaseapp.com",
 projectId: "aquilux-5b489",
 storageBucket: "aquilux-5b489.firebasestorage.app",
 messagingSenderId: "93678277046",
 appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadOwnerDashboard() {
   const container = document.getElementById("adminOrdersContainer");
   try {
       const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
       const snapshot = await getDocs(q);
       if(snapshot.empty) { container.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>No records found.</td></tr>"; return; }
       container.innerHTML = "";
       snapshot.forEach(docSnap => {
           const order = docSnap.data();
           const docId = docSnap.id;
           let nestedProductsHtml = `<div class="nested-items-list">`;
           const targetCart = order.cart || order.items || [];
           targetCart.forEach(item => {
               nestedProductsHtml += `
               <div class="nested-item-row">
                  <img src="${item.img || item.image || ''}" onerror="this.style.display='none'">
                  <div>
                     <span style="font-weight:500; font-size:13px;">${item.n || item.productName || 'Item'}</span><br>
                     <small style="opacity:0.6; font-size:11px;">Size: ${item.s || item.size || 'M'} · Qty: ${item.q || item.quantity || 1}</small>
                  </div>
               </div>`;
           });
           nestedProductsHtml += `</div>`;

           let statusLabel = order.paymentStatus || "Pending Verification";
           let badgeClass = "pending";
           if(statusLabel.toLowerCase() === "approved") badgeClass = "approved";
           if(statusLabel.toLowerCase() === "rejected") badgeClass = "rejected";

           container.innerHTML += `
           <tr>
              <td><strong>${order.orderNumber || 'N/A'}</strong><br><small style="color:#888;">UTR: ${order.utrReference || 'None'}</small></td>
              <td style="font-size:13px; line-height:1.5;"><b>${order.receiverName}</b><br>${order.flat}, ${order.road}<br>${order.city} - ${order.pincode}<br>📞 ${order.phone}</td>
              <td>${nestedProductsHtml}</td>
              <td style="font-weight:600;">₹${order.total}</td>
              <td><span class="badge ${badgeClass}">${statusLabel}</span></td>
              <td>
                 <button class="action-btn approve" onclick="updateOrderStatus('${docId}', 'Approved')">Approve</button>
                 <button class="action-btn reject" onclick="updateOrderStatus('${docId}', 'Rejected')">Reject</button>
                 <button class="action-btn delete" onclick="deleteOrderPermanent('${docId}')">Delete</button>
              </td>
           </tr>`;
       });
   } catch(e) { container.innerHTML = "<tr><td colspan='6'>Failed loading data.</td></tr>"; }
}

window.updateOrderStatus = async function(docRefId, targetStatusState) {
    try {
        await updateDoc(doc(db, "orders", docRefId), { paymentStatus: targetStatusState, orderStatus: targetStatusState });
        alert(`Status changed to ${targetStatusState}`); loadOwnerDashboard();
    } catch(err) { alert(err.message); }
}

window.deleteOrderPermanent = async function(docRefId) {
    if(!confirm("Warning: Permanent delete order from database?")) return;
    try {
        await deleteDoc(doc(db, "orders", docRefId));
        alert("Order completely wiped out!"); loadOwnerDashboard();
    } catch(err) { alert(err.message); }
}
window.addEventListener("DOMContentLoaded", loadOwnerDashboard);
</script>
</body>
</html>
