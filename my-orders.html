<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - Aquilux</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0a0a0a;
    color:#fff;
}

header{
    padding:20px;
    border-bottom:1px solid #222;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
}

.back-btn{
    color:#fff;
    text-decoration:none;
    border:1px solid #444;
    padding:10px 18px;
    border-radius:8px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.title{
    font-size:32px;
    margin-bottom:30px;
}

.order-card{
    background:#111;
    border:1px solid #222;
    border-radius:16px;
    padding:25px;
    text-align:center;
}

.order-card h2{
    margin-top:0;
}

.status{
    margin-top:15px;
    color:#ffbf00;
    font-weight:bold;
}

</style>

</head>

<body>



<header>

<div class="logo">
Aquilux
</div>

<a href="index.html" class="back-btn">
← Continue Shopping
</a>

</header>

<div class="container">

<h1 class="title">
My Orders
</h1>

<div id="ordersContainer">

    <!-- Firebase se orders yahan automatically aayenge -->

</div>

</div>




<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    orderBy
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

// 👇 YAHAN ye config paste karna hai

const firebaseConfig = {

  apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",

  authDomain: "aquilux-5b489.firebaseapp.com",

  projectId: "aquilux-5b489",

  storageBucket: "aquilux-5b489.firebasestorage.app",

  messagingSenderId: "93678277046",

  appId: "1:93678277046:web:22a1904a3d8a9112edf117"

};

// Firebase start

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

// 👇 STEP 6.3 YAHAN
onAuthStateChanged(auth, (user) => {

    if (!user) {

        alert("Please sign in first.");

        window.location.href = "index.html";

        return;

    }

    loadOrders(user.uid);

});


async function loadOrders(uid){

    const container = document.getElementById("ordersContainer");

    container.innerHTML = "<p>Loading orders...</p>";

    const q = query(
        collection(db,"orders"),
        where("userId","==",uid),
        orderBy("createdAt","desc")
    );

    const snapshot = await getDocs(q);

    if(snapshot.empty){

        container.innerHTML = `
        <div class="order-card">
            <h2>No Orders Yet</h2>
            <p>You haven't placed any order yet.</p>
        </div>
        `;

        return;

    }

    container.innerHTML = "";

    snapshot.forEach(doc=>{

        const order = doc.data();

        container.innerHTML += `
        <div class="order-card">

            <h2>${order.orderNumber}</h2>

            <div class="status">
                ${order.paymentStatus}
            </div>

            <p>
                Total :
                ₹${order.total}
            </p>

            <p>
                ${order.items.length} Products
            </p>

        </div>
        `;

    });

}  



    

</script>

    
</body>
</html>
