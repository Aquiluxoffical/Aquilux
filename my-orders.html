<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Aquilux</title>
<style>
/* ==========================================================================
   1. Typography & Global Reset (Old Money Alignment)
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', Arial, sans-serif;
}

body {
    background: #ffffff; 
    color: #111111;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease, color 0.4s ease;
    min-height: 100vh;
}

html[data-theme="dark"] body { background: #111111; color: #ffffff; }
html[data-theme="olive"] body { background: #d7d9cf; color: #2c3525; }

header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 6%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(17, 17, 17, 0.08);
    z-index: 100;
}
html[data-theme="dark"] header { background: rgba(17, 17, 17, 0.85); border-bottom-color: rgba(255, 255, 255, 0.08); }
html[data-theme="olive"] header { background: rgba(215, 217, 207, 0.85); border-bottom-color: rgba(44, 53, 37, 0.1); }

.logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.back-btn {
    color: inherit;
    text-decoration: none;
    border: 1px solid rgba(17, 17, 17, 0.15);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.back-btn:hover { background: rgba(17, 17, 17, 0.05); border-color: currentColor; }

.main-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 20px 60px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 40px;
}

.page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    margin-bottom: 25px;
}

.filter-box {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(17, 17, 17, 0.08);
    padding: 25px;
    border-radius: 8px;
    position: sticky;
    top: 100px;
}
html[data-theme="dark"] .filter-box { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); }

.filter-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; margin-bottom: 15px; }
.filter-options { display: flex; flex-direction: column; gap: 12px; }
.filter-btn {
    background: transparent;
    color: inherit;
    border: 1px solid rgba(17, 17, 17, 0.1);
    padding: 12px;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
}
.filter-btn.active, .filter-btn:hover { background: #111111; color: #ffffff; }
html[data-theme="dark"] .filter-btn.active, html[data-theme="dark"] .filter-btn:hover { background: #ffffff; color: #111111; }

/* ==========================================================================
   Custom Floating Top Notification (Premium Toast Banner)
   ========================================================================= */
.custom-notification {
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff4a4a;
    color: #ffffff;
    padding: 14px 28px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    box-shadow: 0 10px 30px rgba(255, 74, 74, 0.25);
    z-index: 999999;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.custom-notification.show {
    top: 30px;
}
.custom-notification svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

/* ==========================================================================
   4. Compact Order Card Elements (Mobile Optimized)
   ========================================================================== */
.order-card {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(17, 17, 17, 0.08);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
}
html[data-theme="dark"] .order-card { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); }

.order-meta-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(17, 17, 17, 0.06);
    padding-bottom: 12px;
    margin-bottom: 15px;
}

.order-id-group h2 { font-size: 14px; font-weight: 600; }
.order-date { font-size: 11px; opacity: 0.6; margin-top: 2px; }

/* Status Badges with Dynamic Micro Pulses */
.status-container { display: inline-flex; align-items: center; gap: 8px; }
.status-badge {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.status-badge.pending { background: rgba(255, 191, 0, 0.1); color: #d49b00; }
.status-badge.approved { background: rgba(24, 183, 90, 0.1); color: #148f43; }
.status-badge.dispatched { background: rgba(0, 150, 255, 0.1); color: #0076d6; }
.status-badge.cancelled { background: rgba(255, 74, 74, 0.1); color: #c22d2d; }

.pulse-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.status-badge.pending .pulse-dot { background: #ffbf00; animation: yellowPulse 1.6s infinite ease-in-out; }
.status-badge.approved .pulse-dot { background: #18b75a; animation: greenPulse 1.6s infinite ease-in-out; }
.status-badge.dispatched .pulse-dot { background: #0096ff; animation: bluePulse 1.6s infinite ease-in-out; }
.status-badge.cancelled .pulse-dot { background: #ff4a4a; }

@keyframes yellowPulse {
    0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 191, 0, 0.4); }
    70% { transform: scale(1.1); box-shadow: 0 0 0 5px rgba(255, 191, 0, 0); }
    100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(255, 191, 0, 0); }
}
@keyframes greenPulse {
    0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(24, 183, 90, 0.4); }
    70% { transform: scale(1.1); box-shadow: 0 0 0 5px rgba(24, 183, 90, 0); }
    100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(24, 183, 90, 0); }
}
@keyframes bluePulse {
    0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 150, 255, 0.4); }
    70% { transform: scale(1.1); box-shadow: 0 0 0 5px rgba(0, 150, 255, 0); }
    100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0, 150, 255, 0); }
}

.approval-banner {
    background: rgba(24, 183, 90, 0.04);
    border: 1px dashed rgba(24, 183, 90, 0.25);
    color: #148f43;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 500;
    margin-bottom: 12px;
    border-radius: 4px;
    text-align: left;
}
html[data-theme="dark"] .approval-banner { color: #26d26b; }

/* Streamlined Product Rows (Ultra-Thin Layout) */
.order-item-row {
    display: flex;
    gap: 15px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(17, 17, 17, 0.04);
}
.order-item-row:last-of-type { border-bottom: none; }
.item-thumb-wrapper { width: 50px; aspect-ratio: 3 / 4; background: rgba(0,0,0,0.02); overflow: hidden; border-radius: 2px; }
.item-thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
.item-particulars { flex: 1; }
.item-particulars h4 { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.item-particulars p { font-size: 11px; opacity: 0.6; }
.item-cost-summary { text-align: right; font-size: 13px; font-weight: 500; }

/* Footer action area inside card structure */
.order-summary-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    padding-top: 12px;
    border-top: 1px solid rgba(17, 17, 17, 0.06);
}
.order-total-lbl { font-size: 12px; opacity: 0.7; text-transform: uppercase; }
.order-total-val { font-size: 16px; font-weight: 600; }

.action-dock-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
}

/* Reverse Timer Text Styling */
.cancel-timer-countdown {
    font-size: 11px;
    opacity: 0.75;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: #ff4a4a;
}
html[data-theme="olive"] .cancel-timer-countdown { color: #b51c1c; }

/* Executed Locked Order Text */
.executed-lock-text {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888888;
}

/* Custom Minimal Cancel Button Action */
.cancel-action-btn {
    background: transparent;
    color: #ff4a4a;
    border: 1px solid rgba(255, 74, 74, 0.25);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
}
.cancel-action-btn:hover {
    background: rgba(255, 74, 74, 0.05);
    border-color: #ff4a4a;
}

.empty-card { text-align: center; padding: 60px 20px; }
.empty-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; margin-bottom: 10px; }
.empty-card p { font-size: 14px; opacity: 0.6; }

/* Mobile View Port Overwrite */
@media(max-width: 768px) {
    .main-wrapper { grid-template-columns: 1fr; padding-top: 95px; gap: 20px; }
    .filter-box { position: static; padding: 15px; }
    .filter-options { flex-direction: row; overflow-x: auto; padding-bottom: 3px; gap: 8px; }
    .filter-btn { padding: 8px 12px; font-size: 12px; }
    .page-title { font-size: 1.8rem; margin-bottom: 15px; }
    .order-card { padding: 15px; margin-bottom: 15px; }
    .order-item-row { gap: 12px; padding: 8px 0; }
    .item-thumb-wrapper { width: 45px; }
    .order-total-val { font-size: 15px; }
}
</style>
</head>
<body>

<!-- Custom Premium Notification Top Bar -->
<div id="topNotification" class="custom-notification">
    <svg viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span id="notificationMessage">Cancel denied due to dispatched to customer.</span>
</div>

<header>
    <div class="logo">Aquilux</div>
    <a href="index.html" class="back-btn">← Continue Shopping</a>
</header>

<div class="main-wrapper">
    <div class="filter-box">
        <h3>Time Filter</h3>
        <div class="filter-options">
            <button class="filter-btn active" id="btn-all" onclick="setDaysFilter('all')">All Orders</button>
            <button class="filter-btn" id="btn-30" onclick="setDaysFilter(30)">Last 30 Days</button>
            <button class="filter-btn" id="btn-60" onclick="setDaysFilter(60)">Last 60 Days</button>
            <button class="filter-btn" id="btn-90" onclick="setDaysFilter(90)">Last 90 Days</button>
        </div>
    </div>

    <div class="timeline-panel">
        <h1 class="page-title">My Orders History</h1>
        <div id="ordersContainer"><p style="opacity:0.5;">Establishing secure session...</p></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
  authDomain: "aquilux-5b489.firebaseapp.com",
  projectId: "aquilux-5b489",
  storageBucket: "aquilux-5b489.firebasestorage.app",
  messagingSenderId: "93678277046",
  appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allFetchedOrders = [];
let activeFilter = 'all';
let currentUserId = null;
window.activeCancelTimers = {}; // Object bucket to hold running loop pointers safely

const activeTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", activeTheme);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        alert("Please sign in first.");
        window.location.href = "index.html";
        return;
    }
    currentUserId = user.uid;
    fetchOrderManifest(user.uid);
});

async function fetchOrderManifest(uid) {
    const container = document.getElementById("ordersContainer");
    container.innerHTML = "<p style='opacity:0.6; font-size:14px;'>Loading historical database tracks...</p>";

    try {
        // Stop any running intervals before refreshing to avoid memory leaks
        Object.keys(window.activeCancelTimers).forEach(key => clearInterval(window.activeCancelTimers[key]));
        window.activeCancelTimers = {};

        const q = query(
            collection(db, "orders"),
            where("userId", "==", uid),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);
        allFetchedOrders = [];
        snapshot.forEach(docSnap => { 
            const data = docSnap.data();
            data.firebaseDocId = docSnap.id; 
            allFetchedOrders.push(data); 
        });
        applyVisualRenders();

    } catch(err) {
        console.error("Firebase Exception Error:", err);
        container.innerHTML = `<p style="color:#ff4a4a; font-size:14px;">Sync error: ${err.message}</p>`;
    }
}

function showTopNotification(msg) {
    const toast = document.getElementById("topNotification");
    document.getElementById("notificationMessage").innerText = msg;
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 4500); 
}

function applyVisualRenders() {
    const container = document.getElementById("ordersContainer");
    container.innerHTML = "";
    const now = Date.now();
    
    let filteredList = allFetchedOrders.filter(order => {
        if (activeFilter === 'all') return true;
        let timestampMillis = now;
        if(order.createdAt && order.createdAt.toMillis) timestampMillis = order.createdAt.toMillis();
        else if (order.createdAt && order.createdAt.seconds) timestampMillis = order.createdAt.seconds * 1000;
        return ((now - timestampMillis) / (1000 * 60 * 60 * 24)) <= Number(activeFilter);
    });

    if(filteredList.length === 0){
        container.innerHTML = `<div class="empty-card"><h2>No Records Found</h2><p>No orders placed matching this criteria.</p></div>`;
        return;
    }

    filteredList.forEach(order => {
        let displayDate = "Recent Transaction";
        let orderTimeMillis = now;

        if(order.createdAt) {
            orderTimeMillis = order.createdAt.toMillis ? order.createdAt.toMillis() : (order.createdAt.seconds * 1000 || now);
            const dateObj = new Date(orderTimeMillis);
            displayDate = dateObj.toLocaleDateString('en-IN', {day: 'numeric', month: 'short', year: 'numeric'});
        }

        let itemsHtml = "";
        if(Array.isArray(order.items || order.cart)) {
            const parsedItems = order.cart || order.items;
            parsedItems.forEach(item => {
               itemsHtml += `
               <div class="order-item-row">
                   <div class="item-thumb-wrapper"><img src="${item.img || item.image || ''}" onerror="this.style.display='none'"></div>
                   <div class="item-particulars">
                       <h4>${item.n || item.productName || 'Premium Apparel'}</h4>
                       <p>Size : ${item.s || item.size || 'M'} · Qty : ${item.q || item.quantity || 1}</p>
                   </div>
                   <div class="item-cost-summary">₹${(item.p || item.price || 0) * (item.q || item.quantity || 1)}</div>
               </div>`;
            });
        }

        let currentStatus = (order.paymentStatus || "Pending Verification").toLowerCase();
        let customOrderStatus = (order.orderStatus || "").toLowerCase();
        
        let isCancelled = currentStatus === "cancelled by user" || customOrderStatus === "cancelled by user" || currentStatus === "cancelled by owner";
        let isDispatched = currentStatus === "dispatched" || customOrderStatus === "dispatched";
        let isApproved = currentStatus === "approved" || currentStatus === "success" || customOrderStatus === "approved" || isDispatched;
        
        let statusClass = "pending";
        let statusText = "Pending Verification";

        if (isCancelled) {
            statusClass = "cancelled";
            statusText = "Cancelled";
        } else if (isDispatched) {
            statusClass = "dispatched";
            statusText = "Dispatched";
        } else if (isApproved) {
            statusClass = "approved";
            statusText = "Approved";
        }

        let successBannerHtml = (isApproved && !isDispatched) ? `
        <div class="approval-banner">
           🎉 Your order is successful! You will get your delivery ID soon.
        </div>` : "";

        if (isDispatched) {
            successBannerHtml = `
            <div class="approval-banner" style="background: rgba(0, 150, 255, 0.04); border-color: rgba(0, 150, 255, 0.25); color: #0076d6;">
               🚚 Your order has been dispatched from Yash Ojha's Ahmedabad Hub! Tracking parameters synced.
            </div>`;
        }

        // Action Right Dock Injection setup
        let rightActionDockHtml = "";
        const uniqueDockId = `action_dock_${order.firebaseDocId}`;
        const uniqueTimerId = `timer_label_${order.firebaseDocId}`;

        if (isCancelled) {
            rightActionDockHtml = `<span class="executed-lock-text">Cancelled</span>`;
        } else {
            // Three hours logic duration check calculation
            const threeHoursInMillis = 3 * 60 * 60 * 1000;
            const expirationTime = orderTimeMillis + threeHoursInMillis;
            
            if (Date.now() >= expirationTime) {
                // If 3 hours window already crossed over
                rightActionDockHtml = `<span class="executed-lock-text">This order executed, can’t cancel now</span>`;
            } else {
                // Inside the valid 3 hours frame window loop
                rightActionDockHtml = `
                <div class="action-dock-right" id="${uniqueDockId}">
                    <button class="cancel-action-btn" onclick="cancelPendingOrder('${order.firebaseDocId}', ${isDispatched})">Cancel Order</button>
                    <span class="cancel-timer-countdown" id="${uniqueTimerId}">Calculating window...</span>
                </div>`;
                
                // Initialize active countdown ticking script loops
                initiateCancelCountdownTimer(expirationTime, uniqueTimerId, uniqueDockId);
            }
        }

        container.innerHTML += `
        <div class="order-card">
            <div class="order-meta-header">
                <div class="order-id-group">
                    <h2>ID: ${order.orderNumber || 'AQ-Unverified'}</h2>
                    <div class="order-date">Purchased on ${displayDate}</div>
                </div>
                <div class="status-container">
                    <div class="status-badge ${statusClass}">
                        ${(!isCancelled) ? '<span class="pulse-dot"></span>' : ''}${statusText}
                    </div>
                </div>
            </div>
            ${successBannerHtml}
            <div class="order-manifest-items">${itemsHtml}</div>
            <div class="order-summary-footer">
                <div>
                   <span class="order-total-lbl">Gross Liability: </span>
                   <span class="order-total-val">₹${order.total || 0}</span>
                </div>
                <div id="dock_wrapper_${order.firebaseDocId}">${rightActionDockHtml}</div>
            </div>
        </div>`;
    });
}

function initiateCancelCountdownTimer(expireTime, timerElementId, dockElementId) {
    function processTick() {
        const timeLeft = expireTime - Date.now();
        const element = document.getElementById(timerElementId);
        
        if (timeLeft <= 0) {
            clearInterval(window.activeCancelTimers[timerElementId]);
            const parentDock = document.getElementById(dockElementId);
            if (parentDock) {
                parentDock.parentElement.innerHTML = `<span class="executed-lock-text">This order executed, can’t cancel now</span>`;
            }
            return;
        }

        if (element) {
            const hrs = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((timeLeft % (1000 * 60)) / 1000);
            
            element.innerText = `${String(hrs).padStart(2, '0')}h ${String(mins).padStart(2, '0')}m ${String(secs).padStart(2, '0')}s left to cancel`;
        }
    }

    // Run first layout pass instantly, then spin loop each second
    setTimeout(processTick, 50);
    window.activeCancelTimers[timerElementId] = setInterval(processTick, 1000);
}

window.cancelPendingOrder = async function(docId, isDispatched) {
    if(isDispatched) {
        showTopNotification("Cancel Denied: Order has been Dispatched to Customer.");
        return;
    }

    const doubleCheck = confirm("This order will be cancelled if it isn’t dispatched yet.");
    if(!doubleCheck) return;

    alert("Notice: You have to visit the website to check the status of this order.");

    try {
        const orderDocRef = doc(db, "orders", docId);
        await updateDoc(orderDocRef, {
            paymentStatus: "Cancelled by User",
            orderStatus: "Cancelled by User"
        });
        alert("Order cancellation request processed successfully!");
        fetchOrderManifest(currentUserId); 
    } catch(err) {
        console.error("Cancellation Error Exception:", err);
        alert("Action dropped: " + err.message);
    }
}

window.setDaysFilter = function(filterValue) {
    activeFilter = filterValue;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(filterValue === 'all' ? 'btn-all' : `btn-${filterValue}`).classList.add('active');
    applyVisualRenders();
}
</script>
</body>
</html>
