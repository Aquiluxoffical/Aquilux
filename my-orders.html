<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Aquilux</title>
<style>
/* ==========================================================================
   1. Typography & Global Reset (Old Money Vibe Alignment)
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', Arial, sans-serif;
}

body {
    background: #ffffff; 
    color: #111111;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease, color 0.4s ease;
    min-height: 100vh;
}

/* Base Theme Color Adaptations mapped to local storage rules */
html[data-theme="dark"] body { background: #111111; color: #ffffff; }
html[data-theme="olive"] body { background: #d7d9cf; color: #2c3525; }

/* ==========================================================================
   2. Header Setup
   ========================================================================== */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 6%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(17, 17, 17, 0.08);
    z-index: 100;
}
html[data-theme="dark"] header {
    background: rgba(17, 17, 17, 0.85);
    border-bottom-color: rgba(255, 255, 255, 0.08);
}
html[data-theme="olive"] header {
    background: rgba(215, 217, 207, 0.85);
    border-bottom-color: rgba(44, 53, 37, 0.1);
}

.logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.back-btn {
    color: inherit;
    text-decoration: none;
    border: 1px solid rgba(17, 17, 17, 0.15);
    padding: 10px 20px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
}
html[data-theme="dark"] .back-btn { border-color: rgba(255, 255, 255, 0.2); }
.back-btn:hover {
    background: rgba(17, 17, 17, 0.05);
    border-color: currentColor;
}

/* ==========================================================================
   3. Main Dashboard Grid Structure (Sidebar + Main panel)
   ========================================================================== */
.main-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 20px 60px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 40px;
    align-items: start;
}

.page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    margin-bottom: 25px;
    letter-spacing: 0.5px;
}

/* Sidebar Dashboard Filter Box */
.filter-box {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(17, 17, 17, 0.08);
    padding: 25px;
    border-radius: 8px;
    position: sticky;
    top: 100px;
}
html[data-theme="dark"] .filter-box { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); }
html[data-theme="olive"] .filter-box { background: rgba(255, 255, 255, 0.35); border-color: rgba(44, 53, 37, 0.1); }

.filter-box h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    margin-bottom: 15px;
}

.filter-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.filter-btn {
    background: transparent;
    color: inherit;
    border: 1px solid rgba(17, 17, 17, 0.1);
    padding: 12px;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.3s ease;
}
html[data-theme="dark"] .filter-btn { border-color: rgba(255, 255, 255, 0.1); }

.filter-btn.active, .filter-btn:hover {
    background: #111111;
    color: #ffffff;
    border-color: #111111;
}
html[data-theme="dark"] .filter-btn.active, html[data-theme="dark"] .filter-btn:hover {
    background: #ffffff;
    color: #111111;
    border-color: #ffffff;
}

/* ==========================================================================
   4. Luxury Order Card Elements
   ========================================================================== */
.order-card {
    background: rgba(255, 255, 255, 0.45);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(17, 17, 17, 0.08);
    border-radius: 8px;
    padding: 25px;
    margin-bottom: 25px;
}
html[data-theme="dark"] .order-card { background: rgba(255, 255, 255, 0.04); border-color: rgba(255, 255, 255, 0.08); }
html[data-theme="olive"] .order-card { background: rgba(255, 255, 255, 0.35); border-color: rgba(44, 53, 37, 0.1); }

.order-meta-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(17, 17, 17, 0.06);
    padding-bottom: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
}
html[data-theme="dark"] .order-meta-header { border-bottom-color: rgba(255, 255, 255, 0.06); }

.order-id-group h2 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
}
.order-date {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 2px;
}

.status-badge {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: rgba(17, 17, 17, 0.05);
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 600;
}
html[data-theme="dark"] .status-badge { background: rgba(255, 255, 255, 0.08); }

/* Products Layout Inside Order Card */
.order-item-row {
    display: flex;
    gap: 20px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(17, 17, 17, 0.04);
}
html[data-theme="dark"] .order-item-row { border-bottom-color: rgba(255, 255, 255, 0.04); }
.order-item-row:last-of-type { border-bottom: none; }

.item-thumb-wrapper {
    width: 65px;
    aspect-ratio: 3 / 4;
    background: rgba(0,0,0,0.02);
    overflow: hidden;
    border-radius: 2px;
}
.item-thumb-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.item-particulars {
    flex: 1;
}
.item-particulars h4 {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 3px;
}
.item-particulars p {
    font-size: 12px;
    opacity: 0.6;
}

.item-cost-summary {
    text-align: right;
    font-size: 14px;
    font-weight: 500;
}

.order-summary-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid rgba(17, 17, 17, 0.06);
}
html[data-theme="dark"] .order-summary-footer { border-top-color: rgba(255, 255, 255, 0.06); }
.order-total-lbl { font-size: 13px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.5px; }
.order-total-val { font-size: 18px; font-weight: 600; }

/* Empty Setup */
.empty-card {
    text-align: center;
    padding: 60px 20px;
}
.empty-card h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 10px;
}
.empty-card p { font-size: 14px; opacity: 0.6; }

/* ==========================================================================
   5. Responsive Adapters
   ========================================================================== */
@media(max-width: 768px) {
    header { padding: 14px 20px; }
    .main-wrapper { grid-template-columns: 1fr; padding-top: 100px; gap: 25px; }
    .filter-box { position: static; padding: 15px; }
    .filter-options { flex-direction: row; overflow-x: auto; padding-bottom: 5px; }
    .filter-btn { flex: 0 0 auto; white-space: nowrap; padding: 10px 15px; }
    .page-title { font-size: 2rem; }
    .order-card { padding: 18px; }
}
</style>
</head>
<body>

<header>
    <div class="logo">Aquilux</div>
    <a href="index.html" class="back-btn">← Continue Shopping</a>
</header>

<div class="main-wrapper">
    <!-- Filter Sidebar Module Panel -->
    <div class="filter-box">
        <h3>Time Filter</h3>
        <div class="filter-options">
            <button class="filter-btn active" id="btn-all" onclick="setDaysFilter('all')">All Orders</button>
            <button class="filter-btn" id="btn-30" onclick="setDaysFilter(30)">Last 30 Days</button>
            <button class="filter-btn" id="btn-60" onclick="setDaysFilter(60)">Last 60 Days</button>
            <button class="filter-btn" id="btn-90" onclick="setDaysFilter(90)">Last 90 Days</button>
        </div>
    </div>

    <!-- Main Order Timeline Container -->
    <div class="timeline-panel">
        <h1 class="page-title">My Orders History</h1>
        <div id="ordersContainer"><p style="opacity:0.5;">Establishing secure session...</p></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
  authDomain: "aquilux-5b489.firebaseapp.com",
  projectId: "aquilux-5b489",
  storageBucket: "aquilux-5b489.firebasestorage.app",
  messagingSenderId: "93678277046",
  appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Global State Arrays
let allFetchedOrders = [];
let activeFilter = 'all';

// Sync local interface color tokens dynamically
const activeTheme = localStorage.getItem("theme") || "light";
document.documentElement.setAttribute("data-theme", activeTheme);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        alert("Please sign in first.");
        window.location.href = "index.html";
        return;
    }
    fetchOrderManifest(user.uid);
});

async function fetchOrderManifest(uid) {
    const container = document.getElementById("ordersContainer");
    container.innerHTML = "<p style='opacity:0.6; font-size:14px;'>Loading historical database tracks...</p>";

    try {
        const q = query(
            collection(db, "orders"),
            where("userId", "==", uid),
            orderBy("createdAt", "desc")
        );

        const snapshot = await getDocs(q);
        allFetchedOrders = [];

        snapshot.forEach(doc => {
            allFetchedOrders.push(doc.data());
        });

        applyVisualRenders();

    } catch(err) {
        console.error("Firebase Fetch Exception Error:", err);
        container.innerHTML = `<p style="color:#ff4a4a; font-size:14px;">Error reading manifest: ${err.message}</p>`;
    }
}

function applyVisualRenders() {
    const container = document.getElementById("ordersContainer");
    container.innerHTML = "";

    // Calculation parameters for timeline metrics
    const now = Date.now();
    
    let filteredList = allFetchedOrders.filter(order => {
        if (activeFilter === 'all') return true;
        
        // Handling timestamp fallbacks securely
        let timestampMillis = now;
        if(order.createdAt && order.createdAt.toMillis) {
            timestampMillis = order.createdAt.toMillis();
        } else if (order.createdAt && order.createdAt.seconds) {
            timestampMillis = order.createdAt.seconds * 1000;
        } else {
            return true; // render if format unrecognizable
        }
        
        const absoluteDiffDays = (now - timestampMillis) / (1000 * 60 * 60 * 24);
        return absoluteDiffDays <= Number(activeFilter);
    });

    if(filteredList.length === 0){
        container.innerHTML = `
        <div class="empty-card">
            <h2>No Records Found</h2>
            <p>You haven't placed any order matching this criteria.</p>
        </div>`;
        return;
    }

    filteredList.forEach(order => {
        // Humanize dynamic calendar dates formatting variables
        let displayDate = "Recent Transaction";
        if(order.createdAt) {
            const dateObj = order.createdAt.toMillis ? new Date(order.createdAt.toMillis()) : new Date();
            displayDate = dateObj.toLocaleDateString('en-IN', {day: 'numeric', month: 'short', year: 'numeric'});
        }

        let itemsHtml = "";
        if(Array.isArray(order.items)) {
            order.items.forEach(item => {
               const productFallbackImage = item.img || "https://images.unsplash.com/photo-1617137968427-85924c800a22?w=150&auto=format&fit=crop&q=60";
               itemsHtml += `
               <div class="order-item-row">
                   <div class="item-thumb-wrapper">
                       <img src="${productFallbackImage}" alt="${item.n || 'Product Image'}">
                   </div>
                   <div class="item-particulars">
                       <h4>${item.n || 'Premium Apparel'}</h4>
                       <p>Size : ${item.s || 'M'} · Qty : ${item.q || 1}</p>
                   </div>
                   <div class="item-cost-summary">
                       ₹${(item.p || 0) * (item.q || 1)}
                   </div>
               </div>
               `;
            });
        }

        container.innerHTML += `
        <div class="order-card">
            <div class="order-meta-header">
                <div class="order-id-group">
                    <h2>ID: ${order.orderNumber || 'AQ-Unverified'}</h2>
                    <div class="order-date">Purchased on ${displayDate}</div>
                </div>
                <div class="status-badge">${order.paymentStatus || 'Processing'}</div>
            </div>
            <div class="order-manifest-items">
                ${itemsHtml}
            </div>
            <div class="order-summary-footer">
                <span class="order-total-lbl">Gross Liability</span>
                <span class="order-total-val">₹${order.total || 0}</span>
            </div>
        </div>
        `;
    });
}

// Global filter state switching pipeline trigger router
window.setDaysFilter = function(filterValue) {
    activeFilter = filterValue;
    
    // Clear styles toggle pipeline mapping updates
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    
    const targetId = filterValue === 'all' ? 'btn-all' : `btn-${filterValue}`;
    document.getElementById(targetId).classList.add('active');
    
    applyVisualRenders();
}
</script>
</body>
</html>
