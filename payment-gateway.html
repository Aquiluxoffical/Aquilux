<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aquilux Payment Gateway</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{
max-width:720px;
width:100%;
background:#111;
border:1px solid #2b2b2b;
border-radius:24px;
padding:30px;
box-shadow:0 30px 80px rgba(0,0,0,.45);
}

.pay{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
}

.pay-logo{\n    width:28px;\n    height:28px;\n    object-fit:contain;\n}

.summary{
margin:25px 0;
padding:22px;
background:#181818;
border:1px solid #2a2a2a;
border-radius:18px;
}

.summary h3{
margin-bottom:18px;
font-size:16px;
letter-spacing:0.5px;
text-transform:uppercase;
opacity:0.8;
}

.summary strong{
font-size:15px;
}

/* Items Row Styling */
.item-row {
display: flex;
align-items: center;
gap: 15px;
padding: 12px 0;
border-bottom: 1px solid #2a2a2a;
}
.item-row:last-child {
border-bottom: none;
}
.item-row img {
width: 50px;
aspect-ratio: 3/4;
object-fit: cover;
border-radius: 6px;
background: #222;
}
.item-details {
flex: 1;
}
.item-details h4 {
font-size: 14px;
font-weight: 500;
margin-bottom: 3px;
}
.item-details p {
font-size: 12px;
color: #888;
}
.item-price-block {
text-align: right;
font-size: 14px;
font-weight: 600;
}

/* Qty Adjustment Triggers inside gateway */
.gateway-qty-ctrl {
display: inline-flex;
align-items: center;
border: 1px solid #333;
border-radius: 4px;
margin-top: 6px;
background: #111;
overflow: hidden;
}
.gateway-qty-ctrl button {
padding: 2px 8px;
background: transparent;
border: none;
color: #fff;
cursor: pointer;
font-size: 12px;
}
.gateway-qty-ctrl button:hover {
background: #222;
}
.gateway-qty-ctrl span {
padding: 0 4px;
font-size: 11px;
min-width: 14px;
text-align: center;
}
.remove-gateway-item {
background: none;
border: none;
color: #ff4a4a;
font-size: 16px;
cursor: pointer;
margin-left: 10px;
opacity: 0.7;
}
.remove-gateway-item:hover {
opacity: 1;
}

/* Total Box & Checkout Trigger Layout Button */
.total-box {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 20px;
padding-top: 15px;
border-top: 1px dashed #333;
font-size: 18px;
font-weight: 600;
}

.payment-action-btn-layout {
width: 100%;
padding: 16px;
background: #ffffff;
color: #000000;
border: none;
border-radius: 12px;
font-weight: 600;
font-size: 14px;
letter-spacing: 1px;
text-transform: uppercase;
cursor: pointer;
margin-top: 25px;
transition: background 0.2s, transform 0.2s;
}
.payment-action-btn-layout:hover {
background: #e5e5e5;
transform: translateY(-1px);
}
.payment-action-btn-layout:active {
transform: translateY(0);
}

#paymentDoneBox {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.85);
backdrop-filter: blur(10px);
display: none;
justify-content: center;
align-items: center;
z-index: 99999;
}
.popup-inner {
background: #111;
border: 1px solid #2b2b2b;
padding: 40px;
border-radius: 24px;
text-align: center;
max-width: 400px;
width: 90%;
}
.popup-inner h2 {
color: #148f43;
margin-bottom: 10px;
}
.popup-inner p {
font-size: 14px;
color: #aaa;
margin-bottom: 25px;
line-height: 1.5;
}
.popup-close-btn {
padding: 10px 24px;
background: #fff;
color: #000;
border: none;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
}
</style>
</head>
<body>

<div class="card">
   <div class="pay">
       <img class="pay-logo" src="https://i.ibb.co/KcK5JqBf/IMG-0068.png" alt="Logo">
       <h2>Aquilux Checkout Ledger</h2>
   </div>

   <div class="summary" id="addressSummaryBlock">
       <h3>Shipping Coordinates</h3>
       <p id="addressText">Loading parameters logs...</p>
   </div>

   <div class="summary">
       <h3>Items Summary</h3>
       <div id="checkoutItemsList">
           <p style="opacity:0.5; font-size:13px;">No active items synced.</p>
       </div>
       
       <div class="total-box">
           <span>Total Remittance</span>
           <span>₹<span id="totalAmount">0</span></span>
       </div>
   </div>

   <button class="payment-action-btn-layout" onclick="paymentDone()">Confirm & Place Order</button>
</div>

<div id="paymentDoneBox">
    <div class="popup-inner">
        <h2>Order Request Sent!</h2>
        <p>Aapka order successfully register ho gaya hai. Final verification ke liye aapko WhatsApp link par redirect kiya ja raha hai.</p>
        <button class="popup-close-btn" onclick="hidePaymentDone()">Okay</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
 authDomain: "aquilux-5b489.firebaseapp.com",
 projectId: "aquilux-5b489",
 storageBucket: "aquilux-5b489.firebasestorage.app",
 messagingSenderId: "93678277046",
 appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUserId = null;

onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUserId = user.uid;
    } else {
        currentUserId = "GUEST_USER";
    }
});

let order = JSON.parse(localStorage.getItem("pendingOrder") || "{}");

if (!order.cart || order.cart.length === 0) {
    alert("Your checkout state is empty! Redirecting to dashboard store.");
    window.location.href = "index.html";
}

function renderCart() {
    const container = document.getElementById("checkoutItemsList");
    container.innerHTML = "";
    
    order.cart.forEach((item, index) => {
        container.innerHTML += `
        <div class="item-row">
            <img src="${item.img || ''}" onerror="this.style.display='none'">
            <div class="item-details">
                <h4>${item.n}</h4>
                <p>Size: ${item.s} · Base: ₹${item.p}</p>
                <div class="gateway-qty-ctrl">
                    <button onclick="changeQty(${index},-1)">−</button>
                    <span>${item.q}</span>
                    <button onclick="changeQty(${index},1)">+</button>
                </div>
                <button class="remove-gateway-item" onclick="removeItem(${index})">×</button>
            </div>
            <div class="item-price-block">
                ₹${item.p * item.q}
            </div>
        </div>`;
    });
    
    updateTotal();
}

window.changeQty = function(index, change) {
    if (order.cart[index].q + change < 1) return;
    order.cart[index].q += change;
    localStorage.setItem("pendingOrder", JSON.stringify(order));
    renderCart();
};

window.removeItem = function(index) {
    order.cart.splice(index, 1);
    localStorage.setItem("pendingOrder", JSON.stringify(order));
    if(order.cart.length === 0) {
        localStorage.removeItem("aquilux_cart");
        window.location.href = "index.html";
    } else {
        renderCart();
    }
};

function updateTotal() {
    let total = 0;
    order.cart.forEach(item => {
        total += item.p * item.q;
    });
    order.total = total;
    document.getElementById("totalAmount").textContent = total;
    localStorage.setItem("pendingOrder", JSON.stringify(order));
    
    // Also sync updates back to main shop index page cart structure matrix 
    localStorage.setItem("aquilux_cart", JSON.stringify(order.cart));
}

function renderAddress() {
    document.getElementById("addressText").innerHTML = `
        <strong>Receiver Name:</strong> ${order.receiverName || 'N/A'}<br>
        <strong>Contact:</strong> ${order.phone || 'N/A'}<br>
        <strong>Space Coordinates:</strong> ${order.flat || ''}, ${order.road || ''} ${order.landmark ? '(Landmark: '+order.landmark+')' : ''}<br>
        <strong>Engine Zone:</strong> ${order.city || 'N/A'}, ${order.state || 'N/A'} - <span style="letter-spacing:0.5px;font-weight:600;">${order.pincode || 'N/A'}</span>
    `;
}

window.hidePaymentDone = function() {
    document.getElementById("paymentDoneBox").style.display = "none";
    window.location.href = "index.html";
};

window.paymentDone = async function() {
    const orderNo = "AQ" + Date.now();
    const message = `🛍️ Aquilux Order Request\n\nOrder No: ${orderNo}\n\nCustomer: ${order.receiverName}\n\nPhone: ${order.phone}\n\nAddress:\n${order.flat || ''}\n${order.road || ''}\n${order.city}, ${order.state} - ${order.pincode}\n\nTotal Liability: ₹${order.total}`;
    
    document.getElementById("paymentDoneBox").style.display = "flex";

    // Format operational arrays logs for database pipeline insertion mapping
    const structuredItems = order.cart.map(x => ({
        productName: x.n,
        price: x.p,
        size: x.s,
        quantity: x.q
    }));

    order.orderNumber = orderNo;
    order.paymentStatus = "Pending Verification";
    order.orderStatus = "Pending";
    order.createdAt = new Date().toISOString();
    order.userId = currentUserId || "GUEST_USER";
    order.items = structuredItems;

    try {
        await addDoc(collection(db, "orders"), order);
        // Clear permanent cart cache memory space after order deployment sync success
        localStorage.removeItem("aquilux_cart");
        localStorage.removeItem("pendingOrder");
    } catch(e) {
        console.error("Firestore submission anomaly traced:", e);
    }

    setTimeout(() => {
        window.open("https://wa.me/919558039135?text=" + encodeURIComponent(message), "_blank");
    }, 1200);
};

// Fire Engines
renderCart();
renderAddress();
</script>
</body>
</html>
