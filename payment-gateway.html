<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Aquilux — Checkout Ledger</title>
<style>
/* ==========================================================================
   1. Luxury Old Money Typography & Reset
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #090909;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 60px 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.checkout-container {
    max-width: 460px;
    width: 100%;
    margin: 0 auto;
}

.brand-hero {
    text-align: center;
    margin-bottom: 45px;
}
.brand-hero img {
    width: 90px;
    opacity: 0.85;
    margin-bottom: 16px;
    transition: transform 0.3s ease;
}
.brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 400;
    letter-spacing: 1.5px;
    color: #ffffff;
}
.brand-subtitle {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255, 255, 255, 0.3);
    margin-top: 6px;
    font-weight: 500;
}

.summary-card {
    background: #111111;
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.summary-card h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.35);
    margin-bottom: 18px;
    font-weight: 600;
    border-left: 1.5px solid #ffffff;
    padding-left: 8px;
}

.address-details { font-size: 13px; line-height: 1.65; color: #a3a3a3; }
.address-details strong { color: #ffffff; font-weight: 500; }

.item-row { display: flex; align-items: center; gap: 15px; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
.item-row:last-of-type { border-bottom: none; }
.item-thumb { width: 44px; aspect-ratio: 3/4; object-fit: cover; border-radius: 4px; background: #161616; }
.item-meta { flex: 1; }
.item-meta h4 { font-size: 13px; font-weight: 400; color: #ffffff; letter-spacing: 0.3px; }
.item-meta p { font-size: 11px; color: rgba(255, 255, 255, 0.35); margin-top: 3px; }
.item-price { font-size: 13px; font-weight: 500; color: #ffffff; }

.total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 18px; border-top: 1px dashed rgba(255, 255, 255, 0.08); }
.total-label { font-size: 11px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 1.5px; }
.total-amount { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; color: #ffffff; }

/* ==========================================================================
   2. Refined Premium Payment Tray Style
   ========================================================================== */
.payment-buttons-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.premium-pay-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 16px 20px;
    background: rgba(255, 255, 255, 0.01);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.premium-pay-btn:hover {
    background: #ffffff;
    color: #000000;
    border-color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(255,255,255,0.05);
}

.btn-left-content {
    display: flex;
    align-items: center;
    gap: 14px;
}

.app-svg-icon {
    height: 16px;
    width: auto;
    max-width: 38px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    transition: filter 0.3s ease;
}

.premium-pay-btn:hover .app-svg-icon {
    filter: none;
}

.premium-pay-btn span {
    font-weight: 500;
}

.arrow-indicator {
    font-size: 14px;
    opacity: 0.3;
    transition: transform 0.3s ease, opacity 0.3s ease;
}
.premium-pay-btn:hover .arrow-indicator {
    opacity: 1;
    transform: translateX(3px);
}
</style>
</head>
<body>

<div class="checkout-container">
    <div class="brand-hero">
        <img src="https://i.ibb.co/KcK5JqBf/IMG-0068.png" alt="Aquilux Emblem">
        <div class="brand-title">Aquilux</div>
        <div class="brand-subtitle">Secure Order Ledger</div>
    </div>

    <div class="summary-card">
        <h3>Shipping Coordinates</h3>
        <div class="address-details" id="addressText">Tracing shipping records...</div>
    </div>

    <div class="summary-card">
        <h3>Items Summary</h3>
        <div id="checkoutItemsList"></div>
        <div class="total-row">
            <span class="total-label">Total Remittance</span>
            <span class="total-amount">₹<span id="totalAmount">0</span></span>
        </div>
    </div>

    <div class="summary-card">
        <h3>Payment Mode</h3>
        <div class="payment-buttons-grid">
            <button class="premium-pay-btn" onclick="triggerAppPayment('google-pay')">
                <div class="btn-left-content">
                    <img class="app-svg-icon" src="images/gpay.svg" alt="Google Pay">
                    <span>Google Pay</span>
                </div>
                <span class="arrow-indicator">→</span>
            </button>

            <button class="premium-pay-btn" onclick="triggerAppPayment('phonepe')">
                <div class="btn-left-content">
                    <img class="app-svg-icon" src="images/PhonePe_Logo.svg" alt="PhonePe">
                    <span>PhonePe</span>
                </div>
                <span class="arrow-indicator">→</span>
            </button>

            <button class="premium-pay-btn" onclick="triggerAppPayment('bhim')">
                <div class="btn-left-content">
                    <img class="app-svg-icon" src="images/Bhim.svg" alt="BHIM UPI">
                    <span>BHIM UPI</span>
                </div>
                <span class="arrow-indicator">→</span>
            </button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
 authDomain: "aquilux-5b489.firebaseapp.com",
 projectId: "aquilux-5b489",
 storageBucket: "aquilux-5b489.firebasestorage.app",
 messagingSenderId: "93678277046",
 appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUserId = "GUEST_USER";
onAuthStateChanged(auth, (user) => { if(user) currentUserId = user.uid; });

let order = JSON.parse(localStorage.getItem("pendingOrder") || "{}");
if (!order.cart || order.cart.length === 0) { window.location.href = "index.html"; }

function renderUI() {
    document.getElementById("addressText").innerHTML = `
        <strong>Receiver Name:</strong> ${order.receiverName || 'N/A'}<br>
        <strong>Contact No:</strong> ${order.phone || 'N/A'}<br>
        <strong>Address Coordinates:</strong> ${order.flat || ''}, ${order.road || ''}<br>
        <strong>Zone parameters:</strong> ${order.city || 'N/A'}, ${order.state || 'N/A'} - ${order.pincode || 'N/A'}
    `;

    const list = document.getElementById("checkoutItemsList");
    list.innerHTML = "";
    order.cart.forEach(item => {
        list.innerHTML += `
        <div class="item-row">
            <img src="${item.img || ''}" class="item-thumb" onerror="this.style.display='none'">
            <div class="item-meta">
                <h4>${item.n}</h4>
                <p>Size: ${item.s} · Quantity: ${item.q}</p>
            </div>
            <div class="item-price">₹${item.p * item.q}</div>
        </div>`;
    });
    document.getElementById("totalAmount").textContent = order.total;
}

// Telegram Live Order Notification Function
async function sendConfirmedOrderTelegramAlert(paymentMethodUsed, orderNo) {
    const botToken = "8892397338:AAEEDt5xZnDLSv5lnUuuVejrJfQlfEqVj64"; 
    const chatId = "656520549"; 
    
    let itemsSummary = "";
    if (Array.isArray(order.cart)) {
        order.cart.forEach(item => {
            itemsSummary += `• ${item.n} (Size: ${item.s}, Qty: ${item.q})\n`;
        });
    }

    const alertText = `🚨 *SUCCESSFUL LIVE ORDER CONFORMED!* 🚨\n\n` +
                      `🆔 *Order No:* ${orderNo}\n` +
                      `📲 *Payment App:* ${paymentMethodUsed}\n` +
                      `💰 *Gross Total:* ₹${order.total}\n` +
                      `👤 *Customer Name:* ${order.receiverName}\n` +
                      `📞 *Contact Number:* ${order.phone}\n` +
                      `📍 *Address:* ${order.flat || ''}, ${order.city || ''}, ${order.state || ''} - ${order.pincode || ''}\n\n` +
                      `📦 *Items List:*\n${itemsSummary || 'No items listed.'}`;

    const endpointUrl = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(alertText)}&parse_mode=Markdown`;
    
    try {
        await fetch(endpointUrl);
        console.log("Live confirmation message pushed to Yash's Telegram.");
    } catch(err) {
        console.error("Pipeline breakdown:", err);
    }
}

window.triggerAppPayment = async function(appTarget) {
    const amount = order.total || 0;
    const merchantName = encodeURIComponent("Aquilux Luxury Store");
    
    const userAgentStr = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(userAgentStr) && !window.MSStream;

    let targetVpa = "";
    let appStoreLink = "";
    let readableAppName = "";

    if (appTarget === 'google-pay') {
        targetVpa = "yashojhaoffical1982@oksbi";
        readableAppName = "Google Pay 🟢";
        appStoreLink = isIOS 
            ? "https://apps.apple.com/in/app/google-pay-save-pay-earn/id1193357041"
            : "https://play.google.com/store/apps/details?id=com.google.android.apps.nbu.paisa.user";
    } else if (appTarget === 'phonepe') {
        targetVpa = "yashojha.13@ybl";
        readableAppName = "PhonePe 🟣";
        appStoreLink = isIOS 
            ? "https://apps.apple.com/in/app/phonepe-india-s-payments-app/id1170258563"
            : "https://play.google.com/store/apps/details?id=com.phonepe.app";
    } else if (appTarget === 'bhim') {
        targetVpa = "9558039135@upi";
        readableAppName = "BHIM UPI 🔵";
        appStoreLink = isIOS 
            ? "https://apps.apple.com/in/app/bhim-making-india-cashless/id1193102223"
            : "https://play.google.com/store/apps/details?id=in.org.npci.upiapp";
    }

    const baseParams = `pa=${targetVpa}&pn=${merchantName}&am=${amount}&cu=INR`;
    let targetUpiUri = `upi://pay?${baseParams}`;

    if (appTarget === 'google-pay') {
        targetUpiUri = isIOS ? `gpay://upi/pay?${baseParams}` : `intent://pay?${baseParams}#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end`;
    } else if (appTarget === 'phonepe') {
        targetUpiUri = isIOS ? `phonepe://upi/pay?${baseParams}` : `intent://pay?${baseParams}#Intent;scheme=upi;package=com.phonepe.app;end`;
    } else if (appTarget === 'bhim') {
        targetUpiUri = isIOS ? `bhim://upi/pay?${baseParams}` : `intent://pay?${baseParams}#Intent;scheme=upi;package=in.org.npci.upiapp;end`;
    }

    const orderNo = "AQ" + Date.now();
    order.orderNumber = orderNo;
    order.paymentStatus = "Pending Verification";
    order.orderStatus = "Pending";
    order.createdAt = new Date().toISOString();
    order.userId = currentUserId;
    order.utrReference = "N/A"; 

    localStorage.setItem("lastOrderNumber", orderNo);
    localStorage.setItem("pendingOrder", JSON.stringify(order));

    // Send Telegram Alert and wait for Database Doc Creation
    await sendConfirmedOrderTelegramAlert(readableAppName, orderNo);

    try {
        await addDoc(collection(db, "orders"), order);
        localStorage.removeItem("aquilux_cart");
    } catch (err) {
        console.error(err);
    }

    window.location.href = targetUpiUri;

    let storeFallbackTimer = setTimeout(() => {
        window.location.href = appStoreLink;
    }, 2500);

    const clearStoreTimers = () => {
        clearTimeout(storeFallbackTimer);
        window.removeEventListener("blur", clearStoreTimers);
        document.removeEventListener("visibilitychange", clearStoreTimers);
    };
    window.addEventListener("blur", clearStoreTimers);
    document.addEventListener("visibilitychange", clearStoreTimers);

    setTimeout(() => {
        window.location.href = "payment.html";
    }, 1500);
};

renderUI();
</script>
</body>
</html>
