<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aquilux Payment Gateway</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}
body{background:#0a0a0a;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{
max-width:720px;
width:100%;
background:#111;
border:1px solid #2b2b2b;
border-radius:24px;
padding:30px;
box-shadow:0 30px 80px rgba(0,0,0,.45);
}

    .pay{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.pay-logo{
    width:28px;
    height:28px;
    object-fit:contain;
}

.summary{
margin:25px 0;
padding:22px;
background:#181818;
border:1px solid #2a2a2a;
border-radius:18px;
}

.summary h3{
margin-bottom:18px;
}

.summary strong{
font-size:15px;
}



  


img{width:70px;display:block;margin:auto}
h1{text-align:center;margin:18px 0 8px}
p{text-align:center;color:#aaa}
.summary{margin:22px 0;padding:16px;background:#181818;border-radius:14px}
.summary div{display:flex;justify-content:space-between;margin:8px 0}
button{width:100%;padding:15px;border:none;border-radius:12px;margin-top:12px;font-weight:700;cursor:pointer}
.pay{background:#fff;color:#000}
#paymentDoneBox{display:none;margin-top:24px;padding-top:18px;border-top:1px solid #333}
.yes{background:#18b75a;color:#fff}
.no{background:#2a2a2a;color:#fff}
      .logo{width:70px;display:block;margin:auto;margin-bottom:20px;}
.subtitle{text-align:center;color:#999;margin-bottom:25px;}
.box{
background:#181818;
border:1px solid #2d2d2d;
padding:20px;
border-radius:18px;
margin-bottom:20px;
}
.changeBtn{background:#2b2b2b;color:#fff;}
.total{
display:flex;
justify-content:space-between;
font-size:22px;
font-weight:bold;
margin-top:20px;
}
.paymentGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}
.payBtn{
background:#fff;
color:#000;
border:none;
padding:18px;
border-radius:16px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}
.payBtn img{
width:50px;
height:50px;
object-fit:contain;
}
.note{
margin-top:20px;
padding:15px;
background:#171717;
border-radius:12px;
color:#aaa;
}
.success{background:#18b75a;color:#fff;}
.cancel{background:#333;color:#fff;}  
</style> 
</head>
<body>
<div class="card">

<img class="logo" src="https://i.ibb.co/KcK5JqBf/IMG-0068.png">

<h1>Secure Checkout</h1>

<p class="subtitle">
Complete your Aquilux order
</p>

<div class="box">

<h2>Delivery Address</h2>

    <div style="margin-bottom:15px;">
<strong>Customer</strong><br>
<span id="customerName"></span>
</div>

<div id="deliveryDetails"></div>

<button
class="changeBtn"
onclick="window.location.href='index.html#cart'">
Change Address
</button>

</div>

<div class="box">

<h2>Order Summary</h2>

<div id="orderItems"></div>

<div class="total">

<span>Total</span>

<span>
₹<span id="totalAmount">0</span>
</span>

</div>

</div>

<div class="box">

<h2>Choose Payment Method</h2>

<div class="paymentGrid">

<button class="payBtn" onclick="pay('gpay')">

<img src="images/gpay.svg">

<span>Google Pay</span>

</button>

<button class="payBtn" onclick="pay('phonepe')">

<img src="images/PhonePe_Logo.svg">

<span>PhonePe</span>

</button>

<button class="payBtn" onclick="pay('paytm')">

<img src="images/Paytm_Logo_(standalone).svg">

<span>Paytm</span>

</button>

</div>

<div class="note">

✔ Secure UPI Payment

<br>

✔ Instant Order Confirmation

<br>

✔ Payment Verified Manually

</div>

</div>

<div id="paymentDoneBox">

<h2>Payment Completed?</h2>

<p>
Did you successfully complete the payment?
</p>

<button
class="success"
onclick="paymentDone()">

Yes, Payment Done

</button>

<button
class="cancel"
onclick="hidePaymentDone()">

Not Yet

</button>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
  authDomain: "aquilux-5b489.firebaseapp.com",
  projectId: "aquilux-5b489",
  storageBucket: "aquilux-5b489.firebasestorage.app",
  messagingSenderId: "93678277046",
  appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const order = JSON.parse(localStorage.getItem("pendingOrder") || "{}");

// Customer
document.getElementById("customerName").textContent =
order.receiverName || "-";

// Delivery Details
document.getElementById("deliveryDetails").innerHTML = `
${order.flat || ""}<br>
${order.road || ""}<br>
${order.landmark || ""}<br>
${order.city || ""}, ${order.state || ""} - ${order.pincode || ""}<br>
📞 ${order.phone || ""}
`;

// Order Summary
renderCart();

function renderCart(){

    let html = "";

    (order.cart || []).forEach((item,index)=>{

        html += `
        <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        padding:15px 0;
        border-bottom:1px solid #333;
        ">

            <div style="flex:1">

                <b>${item.n}</b><br>

                <small>Size : ${item.s}</small><br>

                <div style="margin-top:8px">

                    <button onclick="changeQty(${index},-1)">−</button>

                    <span id="qty${index}" style="margin:0 10px;">
                        ${item.q}
                    </span>

                    <button onclick="changeQty(${index},1)">+</button>

                </div>

            </div>

            <div style="text-align:right">

                <div id="price${index}">
                    ₹${item.p * item.q}
                </div>

                <button
                onclick="removeItem(${index})"
                style="margin-top:8px;">
                Remove
                </button>

            </div>

        </div>
        `;

    });

    document.getElementById("orderItems").innerHTML = html;

    updateTotal();
    
}

    window.pay=function(){

const upi="upi://pay?pa=Yashojhaoffical1982@oksbi&pn=Aquilux&tn=Order&am="+order.total+"&cu=INR";

localStorage.setItem("paymentStarted","true");

window.location.href=upi;

}

// 👇 Step 4 yahin paste hoga
window.addEventListener("focus",()=>{

if(localStorage.getItem("paymentStarted")=="true"){

document.getElementById("paymentDoneBox").style.display="block";

}

});

    window.hidePaymentDone=function(){

document.getElementById("paymentDoneBox").style.display="none";

}
    

// Increase / Decrease Qty
window.changeQty = function(index,change){

    if(order.cart[index].q + change < 1) return;

    order.cart[index].q += change;

    renderCart();

}

// Remove Item
window.removeItem = function(index){

    order.cart.splice(index,1);

    renderCart();

}

// Update Total
function updateTotal(){

    let total = 0;

    order.cart.forEach(item=>{

        total += item.p * item.q;

    });

    order.total = total;

    document.getElementById("totalAmount").textContent = total;

    localStorage.setItem(
        "pendingOrder",
        JSON.stringify(order)
    );

}

  
window.paymentDone=async function(){
 const orderNo="AQ"+Date.now();
const message = `🛍️ Aquilux Order

Order No: ${orderNo}

Customer: ${order.receiverName}

Phone: ${order.phone}

Address:
${order.flat}
${order.road}
${order.landmark}
${order.city}, ${order.state} - ${order.pincode}

Total: ₹${order.total}`;

window.open(
"https://wa.me/919558039135?text=" + encodeURIComponent(message),
"_blank"
);
  
 order.orderNumber=orderNo;
 order.paymentStatus="Pending Verification";
 order.orderStatus="Pending";
 order.createdAt=serverTimestamp();
 try{
   await addDoc(collection(db,"orders"),order);
 }catch(e){
   console.error(e);
 }
 localStorage.setItem("lastOrderNumber",orderNo);
 localStorage.removeItem("paymentStarted");
 location.href="payment.html";
};
</script>
</body>
</html>
