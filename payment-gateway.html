<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Aquilux — Checkout Ledger</title>
<style>
/* ==========================================================================
   1. Luxury Old Money Typography & Reset
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #090909;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 50px 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.checkout-container {
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
}

.brand-hero {
    text-align: center;
    margin-bottom: 40px;
}
.brand-hero img {
    width: 130px;
    opacity: 0.45;
    filter: grayscale(1) brightness(1.3);
    margin-bottom: 12px;
}
.brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: capitalize;
    color: #f5f5f5;
}

.summary-card {
    background: #111111;
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.summary-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 18px;
    font-weight: 600;
}

.address-details { font-size: 13px; line-height: 1.6; color: #b5b5b5; }
.address-details strong { color: #ffffff; font-weight: 500; }

.item-row { display: flex; align-items: center; gap: 15px; padding: 14px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
.item-row:last-of-type { border-bottom: none; }
.item-thumb { width: 48px; aspect-ratio: 3/4; object-fit: cover; border-radius: 4px; background: #1a1a1a; }
.item-meta { flex: 1; }
.item-meta h4 { font-size: 13px; font-weight: 400; color: #ffffff; letter-spacing: 0.3px; }
.item-meta p { font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 3px; }
.item-price { font-size: 13px; font-weight: 500; color: #ffffff; }

.total-row { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 18px; border-top: 1px dashed rgba(255, 255, 255, 0.1); }
.total-label { font-size: 12px; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 1px; }
.total-amount { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }

.universal-intent-btn {
    width: 100%;
    padding: 15px;
    background: #ffffff;
    color: #000000;
    border: 1px solid #ffffff;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 5px;
    transition: all 0.2s ease;
}
.universal-intent-btn:hover { background: rgba(255, 255, 255, 0.9); }

.confirm-btn {
    width: 100%; padding: 16px; background: #ffffff; color: #000000; border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 15px;
}
.confirm-btn:hover { opacity: 0.9; transform: translateY(-1px); }

.status-popup { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 99999; }
.popup-inner { background: #111111; border: 1px solid rgba(255, 255, 255, 0.06); padding: 40px 30px; border-radius: 12px; text-align: center; max-width: 380px; width: 90%; }
.popup-inner h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; margin-bottom: 12px; }
.popup-inner p { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 25px; }
.popup-btn { padding: 12px 28px; background: #ffffff; color: #000000; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="checkout-container">
    <div class="brand-hero">
        <img src="https://i.ibb.co/KcK5JqBf/IMG-0068.png" alt="Aquilux Emblem">
        <div class="brand-title">Aquilux Checkout Ledger</div>
    </div>

    <div class="summary-card">
        <h3>Shipping Coordinates</h3>
        <div class="address-details" id="addressText">Tracing shipping records...</div>
    </div>

    <div class="summary-card">
        <h3>Items Summary</h3>
        <div id="checkoutItemsList"></div>
        <div class="total-row">
            <span class="total-label">Total Remittance</span>
            <span class="total-amount">₹<span id="totalAmount">0</span></span>
        </div>
    </div>

    <div class="summary-card">
        <h3>Select Premium Payment Mode</h3>
        <!-- Clean Single Universal UPI Action Button -->
        <button class="universal-intent-btn" onclick="triggerAppPayment('universal')">
            Pay through UPI
        </button>
    </div>

    <button class="confirm-btn" onclick="placeOrderFinal()">Confirm & Place Order</button>
</div>

<div id="paymentDoneBox" class="status-popup">
    <div class="popup-inner">
        <h2>Order Request Compiled</h2>
        <p>Your processing transaction token has been synced. Opening WhatsApp support log validation tracking node...</p>
        <button class="popup-btn" onclick="closePopupAndHome()">Complete Process</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyA0y2HlxnzZi_hcvDmfV8lmtMbuGd3jpKE",
 authDomain: "aquilux-5b489.firebaseapp.com",
 projectId: "aquilux-5b489",
 storageBucket: "aquilux-5b489.firebasestorage.app",
 messagingSenderId: "93678277046",
 appId: "1:93678277046:web:22a1904a3d8a9112edf117"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUserId = "GUEST_USER";
onAuthStateChanged(auth, (user) => { if(user) currentUserId = user.uid; });

let order = JSON.parse(localStorage.getItem("pendingOrder") || "{}");
if (!order.cart || order.cart.length === 0) { window.location.href = "index.html"; }

function renderUI() {
    document.getElementById("addressText").innerHTML = `
        <strong>Receiver Name:</strong> ${order.receiverName || 'N/A'}<br>
        <strong>Contact No:</strong> ${order.phone || 'N/A'}<br>
        <strong>Address Coordinates:</strong> ${order.flat || ''}, ${order.road || ''}<br>
        <strong>Zone parameters:</strong> ${order.city || 'N/A'}, ${order.state || 'N/A'} - ${order.pincode || 'N/A'}
    `;

    const list = document.getElementById("checkoutItemsList");
    list.innerHTML = "";
    order.cart.forEach(item => {
        list.innerHTML += `
        <div class="item-row">
            <img src="${item.img || ''}" class="item-thumb" onerror="this.style.display='none'">
            <div class="item-meta">
                <h4>${item.n}</h4>
                <p>Size: ${item.s} · Quantity: ${item.q}</p>
            </div>
            <div class="item-price">₹${item.p * item.q}</div>
        </div>`;
    });
    document.getElementById("totalAmount").textContent = order.total;
}

// DIRECT UPI INTENT ENGINE (Triggers Device App Selection Drawer Automatically)
window.triggerAppPayment = function(targetKey) {
    const amount = order.total || 0;
    const name = encodeURIComponent("Aquilux Luxury Store");
    
    const targetVpa = "yashojhaoffical1982@oksbi";
    const standardUpiUrl = `upi://pay?pa=${targetVpa}&pn=${name}&am=${amount}&cu=INR`;

    window.location.href = standardUpiUrl;
};

window.placeOrderFinal = async function() {
    const orderNo = "AQ" + Date.now();
    order.orderNumber = orderNo;
    order.paymentStatus = "Pending Verification";
    order.orderStatus = "Pending";
    order.createdAt = new Date().toISOString();
    order.userId = currentUserId;

    document.getElementById("paymentDoneBox").style.display = "flex";

    try {
        await addDoc(collection(db, "orders"), order);
        localStorage.removeItem("aquilux_cart");
        localStorage.removeItem("pendingOrder");
    } catch(err) { console.error(err); }

    const message = `🛍️ Aquilux Verified Order Manifest\n\nOrder Token: ${orderNo}\nCustomer Name: ${order.receiverName}\nContact Number: ${order.phone}\n\nTotal Remittance Liability: ₹${order.total}`;
    setTimeout(() => { window.open("https://wa.me/919558039135?text=" + encodeURIComponent(message), "_blank"); }, 1200);
};

window.closePopupAndHome = function() { window.location.href = "payment.html"; };
renderUI();
</script>
</body>
</html>
